<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>ULTRA VISION AI - 저시력자용</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <style>
        @keyframes pulse-green { 0%, 100% { box-shadow: inset 0 0 80px #22c55e; } 50% { box-shadow: inset 0 0 180px #22c55e; } }
        @keyframes pulse-red { 0%, 100% { box-shadow: inset 0 0 80px #ef4444; } 50% { box-shadow: inset 0 0 180px #ef4444; } }
        .active-g { animation: pulse-green 0.6s infinite; border: 25px solid #22c55e !important; }
        .active-r { animation: pulse-red 0.6s infinite; border: 25px solid #ef4444 !important; }
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden select-none">

<div id="app" class="relative h-screen flex flex-col">
    <div class="flex bg-slate-900 border-b border-white/10 p-4 justify-between items-center z-50">
        <div id="status-badge" class="font-black text-2xl text-blue-400 italic">SCANNING...</div>
        <div id="zoom-indicator" class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase">Zoom: 1.0x</div>
    </div>

    <div class="relative flex-1 bg-black overflow-hidden">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
        <div id="border-overlay" class="absolute inset-0 z-20 transition-all duration-300 pointer-events-none"></div>
    </div>

    <div id="logs" class="h-12 bg-slate-950 p-2 font-mono text-[10px] text-slate-500 border-t border-white/5">
        <div id="log-content">시스템 초기화 중...</div>
    </div>

    <div id="boot-screen" class="absolute inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-5xl font-black mb-4 text-blue-500">ULTRA VISION</h1>
        <p class="text-slate-400 mb-12">저시력 보조용 전자동 신호등 안내</p>
        <button id="start-btn" class="w-full py-10 bg-blue-600 text-white rounded-[40px] font-black text-4xl shadow-2xl active:scale-95 transition-all">
            화면 터치로 시작
        </button>
    </div>
</div>

<script type="module">
import { ObjectDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

let detector;
let video = document.getElementById("webcam");
const canvasCtx = document.getElementById("output_canvas").getContext("2d", { willReadFrequently: true });
const statusEl = document.getElementById('status-badge');
const borderEl = document.getElementById('border-overlay');
const logEl = document.getElementById('log-content');
const zoomInd = document.getElementById('zoom-indicator');

let audioCtx = null;
let videoTrack = null;
let lastConfirmed = 'unknown';
let signalHistory = [];
let currentZoom = 1.0;

// 1. 카메라 하드웨어 전자동 최적화 (노출 감소 및 초기 줌 설정)
async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: 1280, height: 720 } 
    });
    video.srcObject = stream;
    videoTrack = stream.getVideoTracks()[0];
    
    const capabilities = videoTrack.getCapabilities();
    const settings = {};

    // 야간 빛 번짐 방지를 위해 노출을 자동으로 최소화
    if (capabilities.exposureMode?.includes('continuous')) settings.exposureMode = 'continuous';
    if (capabilities.exposureCompensation) settings.exposureCompensation = capabilities.exposureCompensation.min;
    if (capabilities.focusMode?.includes('continuous')) settings.focusMode = 'continuous';

    await videoTrack.applyConstraints({ advanced: [settings] });
    logEl.textContent = "[Auto] 광학 노출 최적화 완료";
}

// 2. 자동 디지털 줌 제어 (멀리 있는 신호등 대응)
async function updateAutoZoom(targetZoom) {
    if (!videoTrack || currentZoom === targetZoom) return;
    const capabilities = videoTrack.getCapabilities();
    if (capabilities.zoom) {
        const limitedZoom = Math.max(capabilities.zoom.min, Math.min(targetZoom, capabilities.zoom.max));
        await videoTrack.applyConstraints({ advanced: [{ zoom: limitedZoom }] });
        currentZoom = limitedZoom;
        zoomInd.textContent = `Zoom: ${currentZoom.toFixed(1)}x`;
    }
}

// 3. 지능형 HSV 색상 분석 (빛 번짐/흰색 중심 현상 극복)
function analyzeHSV(imageData) {
    const data = imageData.data;
    let rVotes = 0, gVotes = 0;

    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];

        // HSV 변환 로직
        let max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, v = max;
        let d = max - min;
        s = max === 0 ? 0 : d / max;

        if (max === min) h = 0;
        else {
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }

        // 빛이 너무 밝아 하얗게 보일 경우(v > 230)도 포함하는 관용적 판정
        if (v > 150) { 
            // 빨강 영역 (330도 이상, 30도 이하)
            if (h < 0.08 || h > 0.92) rVotes++;
            // 초록/청록 영역 (100도 ~ 160도)
            else if (h > 0.28 && h < 0.45) gVotes++;
        }
    }
    if (rVotes > gVotes && rVotes > 5) return 'red';
    if (gVotes > rVotes && gVotes > 5) return 'green';
    return 'unknown';
}

// 메인 루프
async function predictLoop() {
    if (!detector) return;
    
    const detections = await detector.detectForVideo(video, performance.now());
    const trafficLight = detections.detections.find(d => d.categories[0].categoryName === "traffic light");

    if (trafficLight) {
        const box = trafficLight.boundingBox;
        const score = trafficLight.categories[0].score;

        // [자동화 전략 1] 신호등이 발견되면 즉시 줌인 (원거리 대응)
        if (score > 0.3) {
            await updateAutoZoom(2.5); // 발견 시 2.5배 줌
        }

        canvasCtx.drawImage(video, box.originX, box.originY, box.width, box.height, 0, 0, 100, 100);
        const color = analyzeHSV(canvasCtx.getImageData(0, 0, 100, 100));
        updateUI(color);
    } else {
        // [자동화 전략 2] 신호등이 안 보이면 다시 넓은 시야로 줌아웃
        updateUI('unknown');
        if (currentZoom > 1.0) updateAutoZoom(1.0);
    }
    
    setTimeout(() => { window.requestAnimationFrame(predictLoop); }, 80);
}

function updateUI(color) {
    signalHistory.push(color);
    if (signalHistory.length > 12) signalHistory.shift(); // 안정성을 위해 이력 관리 확장

    const counts = signalHistory.reduce((a, c) => (a[c] = (a[c] || 0) + 1, a), {});
    // [자동화 전략 3] 12프레임 중 8프레임 이상 일치 시 확정 (오작동 방지)
    const final = Object.keys(counts).find(k => counts[k] >= 8 && k !== 'unknown') || 'unknown';

    if (final !== lastConfirmed) {
        lastConfirmed = final;
        if (final === 'green') {
            statusEl.textContent = "초록불 (가세요)";
            borderEl.className = "absolute inset-0 z-20 active-g";
            speak("초록불입니다. 건너가세요.");
            playBeep(880, 0.15);
        } else if (final === 'red') {
            statusEl.textContent = "빨간불 (정지)";
            borderEl.className = "absolute inset-0 z-20 active-r";
            speak("빨간불입니다. 멈추세요.");
            playBeep(440, 0.5);
        } else {
            statusEl.textContent = "인식 중...";
            borderEl.className = "absolute inset-0 z-20";
        }
    }
}

// 음성 및 비프음 유틸리티
function speak(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ko-KR'; s.rate = 1.2;
    window.speechSynthesis.speak(s);
}

function playBeep(f, d) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = f;
    g.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.01);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d);
}

document.getElementById('start-btn').addEventListener('click', async () => {
    document.getElementById('boot-screen').style.display = 'none';
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    detector = await ObjectDetector.createFromOptions(vision, {
        baseOptions: { 
            modelAssetPath: `https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite`, 
            delegate: "GPU" 
        },
        scoreThreshold: 0.35, // 원거리를 위해 문턱값을 낮춤
        runningMode: "VIDEO"
    });

    await setupCamera();
    video.addEventListener("loadeddata", predictLoop);
    speak("시스템 가동. 신호등을 비추어 주세요.");
});
</script>
</body>
</html>
