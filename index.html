<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer-when-downgrade">

    <title>ULTRA VISION AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>

    <!--
        [FIX] defer 제거: defer가 붙으면 DOMContentLoaded 이후에 스크립트가 실행되므로
        renderMap() 최초 호출 시점에 naver 객체가 아직 없어 지도가 그려지지 않음.
        네이버 지도 SDK는 동기(sync) 로드해야 naver.maps가 즉시 사용 가능함.
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=bjbogaucr4&submodules=geocoder"></script>
    -->
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=ek1745ke67&submodules=geocoder"></script>

    <style>
        .h-safe { height: 100dvh; }
        .tab-content { display: none; height: calc(100% - 140px); position: relative; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .tab-content.active { display: block; }
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5; }
        #webcam-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        #border-overlay { position: absolute; inset: 0; z-index: 12; pointer-events: none; transition: all 0.3s; border: 0px solid transparent; }
        .active-r { border: 20px solid rgba(239, 68, 68, 0.4) !important; box-shadow: inset 0 0 50px rgba(239, 68, 68, 0.5); }
        .active-g { border: 20px solid rgba(34, 197, 94, 0.4) !important; box-shadow: inset 0 0 50px rgba(34, 197, 94, 0.5); }

        /* 지도 영역 */
        #map { width: 100%; height: 260px; background-color: #111; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: rgba(59, 130, 246, 0.5); z-index: 15; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-[#050505] text-white overflow-hidden select-none">
<div id="app" class="relative h-safe flex flex-col">
    <nav class="flex bg-[#111] pt-12 border-b border-white/10 z-50">
        <button id="tab-v-btn" class="flex-1 py-4 font-black text-blue-400 border-b-4 border-blue-500">VISION AI</button>
        <button id="tab-d-btn" class="flex-1 py-4 font-black text-zinc-500">V2X DATA</button>
    </nav>

    <div id="vision-tab" class="tab-content active" style="height: 100%;">
        <div id="border-overlay"></div>
        <div class="scanner-line"></div>
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="webcam-canvas"></canvas>
        <div id="debug-panel" class="absolute bottom-6 right-4 z-30 bg-[#111]/90 p-4 rounded-3xl border border-white/10 w-48 shadow-2xl space-y-3 opacity-0 transition-opacity">
            <h3 class="text-[10px] font-bold text-zinc-500 text-center uppercase tracking-tighter">AI ROI ANALYSIS</h3>
            <div class="aspect-[1/2] bg-black rounded-xl overflow-hidden border border-white/20">
                <canvas id="roi-canvas" class="w-full h-full object-cover"></canvas>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-[9px] font-bold text-red-400"><span>RED</span><span id="red-val">0%</span></div>
                <div class="h-1.5 bg-white/5 rounded-full overflow-hidden"><div id="red-bar" class="h-full bg-red-500" style="width: 0%"></div></div>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-[9px] font-bold text-green-400"><span>GREEN</span><span id="green-val">0%</span></div>
                <div class="h-1.5 bg-white/5 rounded-full overflow-hidden"><div id="green-bar" class="h-full bg-green-500" style="width: 0%"></div></div>
            </div>
        </div>
    </div>

    <div id="data-tab" class="tab-content p-6 bg-[#0a0a0a] space-y-4">

        <div id="api-card" class="bg-zinc-900 rounded-[40px] p-8 border-l-[12px] border-zinc-700 shadow-2xl">
            <h1 id="cross-name" class="text-2xl font-black italic tracking-tighter text-zinc-300 uppercase">Searching...</h1>
            <div class="py-6">
                <div id="api-status-text" class="text-7xl font-black text-zinc-800 text-center tracking-tighter">READY</div>
            </div>
            <button id="refresh-api" class="w-full py-4 bg-white/5 rounded-2xl text-[10px] font-bold uppercase text-zinc-500">Manual Refresh</button>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-5 border border-white/5 shadow-xl space-y-3">
            <div id="location-text" class="text-[10px] font-mono text-blue-400 italic">Waiting for GPS...</div>
            <div id="map"></div>
        </div>

        <div class="h-24"></div>
    </div>

    <div id="boot-screen" class="absolute inset-0 bg-[#050505] z-[100] flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="bg-zinc-900 w-full max-w-sm p-10 rounded-[50px] text-center shadow-2xl">
            <h1 class="text-3xl font-black mb-10 italic tracking-tighter uppercase">Ultra Vision</h1>
            <button id="start-btn" class="w-full py-6 bg-blue-600 rounded-[30px] font-black text-xl active:scale-95 transition-transform shadow-xl">SYSTEM START</button>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
