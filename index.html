<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>ULTRA VISION AI - ROI & V2X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=3696a1a72981f0d97505a7dc983c1d39&libraries=services"></script>

    <style>
        .h-safe { height: 100dvh; }
        .tab-content { display: none; height: calc(100% - 140px); position: relative; overflow: hidden; }
        .tab-content.active { display: block; }
        
        /* VISION 탭: 상하 5:5 분할 */
        #webcam-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: #000; border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        #webcam-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        #roi-focus-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #roi-canvas {
            width: auto; height: 80%;
            aspect-ratio: 1 / 2;
            border: 4px solid #3b82f6; border-radius: 20px; background: #000;
        }
        .roi-label { margin-bottom: 8px; font-weight: 900; color: #3b82f6; font-size: 12px; letter-spacing: 2px; }

        /* V2X 탭: 스크롤 가능 */
        #data-tab { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-[#050505] text-white overflow-hidden select-none">
<div id="app" class="relative h-safe flex flex-col">
    <nav class="flex bg-[#111] pt-12 border-b border-white/10 z-50">
        <button id="tab-v-btn" class="flex-1 py-4 font-black text-blue-400 border-b-4 border-blue-500">VISION AI</button>
        <button id="tab-d-btn" class="flex-1 py-4 font-black text-zinc-500">V2X DATA</button>
    </nav>

    <div id="vision-tab" class="tab-content active">
        <div id="webcam-container">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="webcam-canvas"></canvas>
        </div>
        <div id="roi-focus-panel">
            <div class="roi-label">AI REAL-TIME ROI ANALYSIS</div>
            <canvas id="roi-canvas"></canvas>
            <div id="api-status-text" class="mt-2 text-2xl font-black text-zinc-500 uppercase">READY</div>
        </div>
    </div>

    <div id="data-tab" class="tab-content p-6 bg-[#0a0a0a] space-y-4">
        <div id="api-card" class="bg-zinc-900 rounded-[40px] p-8 border-l-[12px] border-zinc-700 shadow-2xl">
            <div class="flex justify-between items-start mb-2">
                <h1 id="cross-name" class="text-2xl font-black italic tracking-tighter text-zinc-300 uppercase">Searching...</h1>
                <span id="api-detailed-status" class="text-[10px] font-bold px-2 py-1 rounded bg-white/5 text-zinc-500">IDLE</span>
            </div>
            <div class="py-4">
                <div id="api-status-text-data" class="text-7xl font-black text-zinc-800 text-center tracking-tighter leading-none">READY</div>
                <div id="api-error-msg" class="text-center text-red-500 text-xs mt-4 font-bold hidden"></div>
            </div>
            <button id="refresh-api" class="w-full py-4 bg-white/5 rounded-2xl text-[10px] font-bold uppercase text-zinc-500 hover:bg-white/10">Manual Refresh</button>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-5 border border-white/5 shadow-xl space-y-3">
            <div class="flex justify-between items-end border-b border-white/5 pb-2">
                <div class="flex-1 pr-4">
                    <div class="text-[9px] uppercase font-black text-zinc-500 mb-1">Current Address</div>
                    <div id="address-text" class="text-sm font-bold text-white leading-tight">주소를 불러오는 중...</div>
                </div>
                <div class="text-right">
                    <div id="location-text" class="text-[9px] font-mono text-blue-400 italic">0.0000, 0.0000</div>
                </div>
            </div>
            <div id="map" style="width:100%; height:200px; border-radius:1rem; background:#111;"></div>
        </div>
        <div class="h-24"></div>
    </div>

    <div id="boot-screen" class="absolute inset-0 bg-[#050505] z-[100] flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="bg-zinc-900 w-full max-w-sm p-10 rounded-[50px] text-center shadow-2xl">
            <h1 class="text-3xl font-black mb-10 italic tracking-tighter uppercase">Ultra Vision</h1>
            <button id="start-btn" class="w-full py-6 bg-blue-600 rounded-[30px] font-black text-xl">SYSTEM START</button>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
