<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>ULTRA VISION v4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <style>
        @keyframes pulse-green { 0%, 100% { box-shadow: inset 0 0 60px #22c55e; } 50% { box-shadow: inset 0 0 160px #22c55e; } }
        @keyframes pulse-red { 0%, 100% { box-shadow: inset 0 0 60px #ef4444; } 50% { box-shadow: inset 0 0 160px #ef4444; } }
        .active-g { animation: pulse-green 0.7s infinite; border: 20px solid #22c55e !important; }
        .active-r { animation: pulse-red 0.7s infinite; border: 20px solid #ef4444 !important; }
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden select-none">

<div id="app" class="relative h-screen flex flex-col">
    <div class="flex bg-slate-900 border-b border-white/10 p-4 justify-between items-center z-50">
        <div id="status-badge" class="font-black text-xl text-blue-400 italic uppercase">READY</div>
        <div class="flex gap-2 items-center">
            <div id="tilt-badge" class="bg-amber-500 px-2 py-1 rounded text-[10px] text-black font-bold hidden">기울기 조정 필요</div>
            <div id="zoom-badge" class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Optimized</div>
        </div>
    </div>

    <div class="relative flex-1 bg-black overflow-hidden">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
        <div id="border-overlay" class="absolute inset-0 z-20 transition-all duration-300 pointer-events-none"></div>
    </div>

    <div id="logs" class="h-16 bg-slate-950 p-2 font-mono text-[10px] text-slate-500 overflow-hidden border-t border-white/5">
        <div id="log-content">[System] 지능형 노출 및 초점 시스템 대기 중...</div>
    </div>

    <div id="boot-screen" class="absolute inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-5xl font-black mb-4 italic tracking-tighter text-blue-500">ULTRA <span class="text-white">VISION</span></h1>
        <p class="text-slate-400 mb-12 text-sm">자동 초점 및 야간 빛 번짐 억제 엔진 v4.5</p>
        <button id="start-btn" class="w-full py-8 bg-blue-600 text-white rounded-[40px] font-black text-3xl shadow-2xl active:scale-95 transition-all">
            시스템 가동
        </button>
    </div>
</div>

<script type="module">
import { ObjectDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

let detector;
let video = document.getElementById("webcam");
const canvasCtx = document.getElementById("output_canvas").getContext("2d", { willReadFrequently: true });
const statusEl = document.getElementById('status-badge');
const borderEl = document.getElementById('border-overlay');
const tiltBadge = document.getElementById('tilt-badge');
const logEl = document.getElementById('log-content');

let audioCtx = null;
let lastConfirmed = 'unknown';
let signalHistory = [];

// 1. 카메라 하드웨어 최적화 (노출/초점/줌)
async function applyOptimizedCamera(stream) {
    const track = stream.getVideoTracks()[0];
    const capabilities = track.getCapabilities();
    const settings = {};

    // 연속 자동 초점
    if (capabilities.focusMode?.includes('continuous')) settings.focusMode = 'continuous';
    // 노출 모드 (야간 빛 번짐 방지용)
    if (capabilities.exposureMode?.includes('continuous')) settings.exposureMode = 'continuous';
    // 디지털 줌 적용 (신호등 확대 인식)
    if (capabilities.zoom) {
        const targetZoom = Math.min(2.0, capabilities.zoom.max);
        settings.zoom = targetZoom;
    }

    try {
        await track.applyConstraints({ advanced: [settings] });
        logEl.textContent = "[System] 하드웨어 가속 및 광학 최적화 완료";
    } catch (e) {
        logEl.textContent = "[System] 하드웨어 제어 일부 제한됨";
    }
}

// 2. 기울기 감지
function handleOrientation(event) {
    const pitch = event.beta; 
    if (pitch < 50 || pitch > 100) {
        tiltBadge.classList.remove('hidden');
    } else {
        tiltBadge.classList.add('hidden');
    }
}

// 3. 지능형 비프음
function playBeep(freq, duration) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

// 4. 색상 분석 (구조 기반: 위 빨강, 아래 초록)
function analyzeTrafficLight(imageData) {
    const data = imageData.data;
    const height = imageData.height;
    const width = imageData.width;
    let topRed = 0, bottomGreen = 0;

    for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        const pixelIdx = i / 4;
        const y = Math.floor(pixelIdx / width);

        // 상단 40% 영역에서 빨간색 감지
        if (y < height * 0.4) {
            if (r > 160 && g < 100 && b < 100) topRed++;
        }
        // 하단 40% 영역에서 초록색 감지
        else if (y > height * 0.6) {
            if (g > 160 && r < 120) bottomGreen++;
        }
    }

    if (topRed > bottomGreen && topRed > 20) return 'red';
    if (bottomGreen > topRed && bottomGreen > 20) return 'green';
    return 'unknown';
}

// 시작 이벤트
document.getElementById('start-btn').addEventListener('click', async () => {
    document.getElementById('boot-screen').style.display = 'none';
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        await DeviceOrientationEvent.requestPermission();
    }
    window.addEventListener('deviceorientation', handleOrientation);

    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    detector = await ObjectDetector.createFromOptions(vision, {
        baseOptions: { 
            modelAssetPath: `https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite`, 
            delegate: "GPU" 
        },
        scoreThreshold: 0.4, // 노이즈 방지를 위해 약간 상향
        runningMode: "VIDEO"
    });

    // 해상도를 640x480으로 낮춰 인식 속도 극대화
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: 640, height: 480 } 
    });
    
    video.srcObject = stream;
    await applyOptimizedCamera(stream);
    video.addEventListener("loadeddata", predictLoop);
    
    announce("시스템이 준비되었습니다.");
});

async function predictLoop() {
    if (!detector) return;
    
    const detections = await detector.detectForVideo(video, performance.now());
    const light = detections.detections.find(d => d.categories[0].categoryName === "traffic light");

    if (light) {
        const box = light.boundingBox;
        const canvas = document.getElementById("output_canvas");
        canvas.width = 100; canvas.height = 100;
        
        // 감지된 박스 부분만 크롭하여 분석
        canvasCtx.drawImage(video, box.originX, box.originY, box.width, box.height, 0, 0, 100, 100);
        const color = analyzeTrafficLight(canvasCtx.getImageData(0, 0, 100, 100));
        updateStatus(color);
    } else {
        updateStatus('unknown');
    }
    
    // 부하를 줄이기 위해 약 100ms 간격으로 실행 (초당 10회)
    setTimeout(() => { window.requestAnimationFrame(predictLoop); }, 100);
}

function updateStatus(color) {
    signalHistory.push(color);
    if (signalHistory.length > 5) signalHistory.shift();
    
    const counts = signalHistory.reduce((a, c) => (a[c] = (a[c] || 0) + 1, a), {});
    const final = Object.keys(counts).find(k => counts[k] >= 3 && k !== 'unknown') || 'unknown';

    if (final !== lastConfirmed) {
        lastConfirmed = final;
        if (final === 'green') {
            statusEl.textContent = "초록불 (GO)";
            borderEl.className = "absolute inset-0 z-20 active-g";
            announce("초록불입니다");
            playBeep(880, 0.1);
        } else if (final === 'red') {
            statusEl.textContent = "빨간불 (STOP)";
            borderEl.className = "absolute inset-0 z-20 active-r";
            announce("빨간불입니다");
            playBeep(440, 0.4);
        } else {
            statusEl.textContent = "SCANNING";
            borderEl.className = "absolute inset-0 z-20";
        }
    }
}

function announce(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ko-KR'; window.speechSynthesis.speak(s);
}
</script>
</body>
</html>
