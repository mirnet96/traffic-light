<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>ULTRA VISION AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>

<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=xa51z84fnk&submodules=geocoder"></script>
<script>
    // 네이버 지도 로드 에러 감지
    window.addEventListener('error', function(e) {
        if (e.target.src && e.target.src.indexOf('naver.com') !== -1) {
            alert('네이버 지도 인증 실패! Client ID나 서비스 URL을 확인하세요.');
        }
    }, true);
</script>

    <style>
        .h-safe { height: 100dvh; }
        /* 탭 컨텐츠: 스크롤 가능하게 수정 */
        .tab-content { 
            display: none; 
            height: calc(100% - 140px); 
            position: relative; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }
        .tab-content.active { display: block; } /* Flex 해제하여 세로 스크롤 허용 */
        
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5; }
        #webcam-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* 지도 높이 명시적 설정 (매우 중요) */
        #map {
            width: 100%;
            height: 280px; 
            background-color: #111;
            border-radius: 1.5rem;
            margin-top: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .scanner-line { position: absolute; width: 100%; height: 2px; background: rgba(59, 130, 246, 0.5); z-index: 15; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-[#050505] text-white overflow-hidden select-none">
<div id="app" class="relative h-safe flex flex-col">
    <nav class="flex bg-[#111] pt-12 border-b border-white/10 z-50">
        <button id="tab-v-btn" class="flex-1 py-4 font-black text-blue-400 border-b-4 border-blue-500">VISION AI</button>
        <button id="tab-d-btn" class="flex-1 py-4 font-black text-zinc-500">V2X DATA</button>
    </nav>

    <div id="vision-tab" class="tab-content active" style="position:relative; height:100%;">
        <div class="scanner-line"></div>
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="webcam-canvas"></canvas>
    </div>

    <div id="data-tab" class="tab-content p-6 bg-[#0a0a0a] space-y-6">
        <div class="bg-zinc-900 rounded-3xl p-5 border border-white/5 shadow-xl">
            <div id="location-text" class="text-sm font-bold text-blue-400 italic">GPS 수신 대기 중...</div>
            <div id="map"></div> </div>

        <div id="api-card" class="bg-zinc-900 rounded-[40px] p-8 border-l-[12px] border-zinc-700 shadow-2xl space-y-4">
            <h1 id="cross-name" class="text-2xl font-black italic">주변 탐색 중...</h1>
            <div class="py-6">
                <div id="api-status-text" class="text-6xl font-black text-zinc-700 text-center tracking-tighter">READY</div>
            </div>
            <button id="refresh-api" class="w-full py-4 bg-white/5 rounded-2xl text-[10px] font-bold uppercase tracking-widest text-zinc-500">Manual Refresh</button>
        </div>
        
        <div class="h-20"></div>
    </div>

    <div id="boot-screen" class="absolute inset-0 bg-[#050505] z-[100] flex items-center justify-center p-6">
        <div class="bg-zinc-900 w-full max-w-sm p-10 rounded-[50px] text-center shadow-2xl">
            <h1 class="text-3xl font-black mb-10 italic tracking-tighter">ULTRA VISION</h1>
            <button id="start-btn" class="w-full py-6 bg-blue-600 rounded-[30px] font-black text-xl">SYSTEM START</button>
        </div>
    </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
