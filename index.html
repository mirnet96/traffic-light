<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>신호등 알리미 Pro - 초고도화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <style>
        @keyframes pulse-green { 0%, 100% { box-shadow: inset 0 0 60px #22c55e; } 50% { box-shadow: inset 0 0 160px #22c55e; } }
        @keyframes pulse-red { 0%, 100% { box-shadow: inset 0 0 60px #ef4444; } 50% { box-shadow: inset 0 0 160px #ef4444; } }
        .active-g { animation: pulse-green 0.7s infinite; border: 25px solid #22c55e !important; }
        .active-r { animation: pulse-red 0.7s infinite; border: 25px solid #ef4444 !important; }
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden select-none">

<div id="app" class="relative h-screen flex flex-col">
    <div class="flex bg-slate-900 border-b border-white/10 p-4 justify-between items-center z-50">
        <div id="status-badge" class="font-black text-xl text-blue-400 italic">READY</div>
        <div class="flex gap-2 items-center">
            <div id="tilt-badge" class="bg-red-600 px-2 py-1 rounded text-[10px] hidden">기울기 부적절</div>
            <div id="zoom-badge" class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">1.0x</div>
        </div>
    </div>

    <div class="relative flex-1 bg-black">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
        <div id="border-overlay" class="absolute inset-0 z-20 transition-all duration-300"></div>
    </div>

    <div id="logs" class="h-24 bg-slate-950 p-2 font-mono text-[9px] text-slate-500 overflow-y-auto border-t border-white/5">
        <div>[System] 기울기 및 사운드 가이드 활성화 대기</div>
    </div>

    <div id="boot-screen" class="absolute inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-5xl font-black mb-4 italic tracking-tighter text-blue-500">ULTRA <span class="text-white">VISION</span></h1>
        <p class="text-slate-400 mb-12 text-sm leading-relaxed">기울기 감지 및 지능형 사운드 엔진 v4.0</p>
        <button id="start-btn" class="w-full py-8 bg-blue-600 text-white rounded-[40px] font-black text-3xl shadow-2xl active:scale-95 transition-all">
            시스템 가동
        </button>
    </div>
</div>

<script type="module">
import { ObjectDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

let detector;
let video = document.getElementById("webcam");
const canvasCtx = document.getElementById("output_canvas").getContext("2d");
const statusEl = document.getElementById('status-badge');
const borderEl = document.getElementById('border-overlay');
const tiltBadge = document.getElementById('tilt-badge');

let stream = null;
let zoomLevel = 1.0;
let signalHistory = [];
let lastConfirmed = 'unknown';
let audioCtx = null; // 비프음용 오디오 컨텍스트

/** [추가] 지능형 비프음 생성 **/
function playBeep(freq, duration) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

/** [추가] 기울기 감지 (Device Orientation) **/
function handleOrientation(event) {
    // beta: 앞뒤 기울기 (-180~180), 보통 폰을 세우면 70~90도 사이
    const pitch = event.beta; 
    if (pitch < 45) { // 너무 바닥을 보고 있을 때
        tiltBadge.classList.remove('hidden');
        tiltBadge.textContent = "폰을 더 세워주세요";
    } else if (pitch > 110) { // 너무 하늘을 보고 있을 때
        tiltBadge.classList.remove('hidden');
        tiltBadge.textContent = "폰을 조금 내려주세요";
    } else {
        tiltBadge.classList.add('hidden');
    }
}

/** [시작] 시스템 초기화 **/
document.getElementById('start-btn').addEventListener('click', async () => {
    document.getElementById('boot-screen').style.display = 'none';
    
    // 1. 오디오 활성화 (유저 클릭 시점)
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // 2. 기울기 권한 요청 (iOS 등 대응)
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        await DeviceOrientationEvent.requestPermission();
    }
    window.addEventListener('deviceorientation', handleOrientation);

    // 3. AI 및 카메라 로드
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    detector = await ObjectDetector.createFromOptions(vision, {
        baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite`, delegate: "GPU" },
        scoreThreshold: 0.35, runningMode: "VIDEO"
    });

    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    video.addEventListener("loadeddata", predictLoop);
    
    announce("초고도화 시스템이 활성화되었습니다.");
});

async function predictLoop() {
    const detections = await detector.detectForVideo(video, performance.now());
    const light = detections.detections.find(d => d.categories[0].categoryName === "traffic light");

    if (light) {
        const box = light.boundingBox;
        document.getElementById("output_canvas").width = video.videoWidth;
        document.getElementById("output_canvas").height = video.videoHeight;
        canvasCtx.drawImage(video, box.originX, box.originY, box.width, box.height, 0, 0, 100, 100);
        const color = analyzeColor(canvasCtx.getImageData(0, 0, 100, 100).data);
        verifyAndAnnounce(color);
    } else {
        verifyAndAnnounce('unknown');
    }
    window.requestAnimationFrame(predictLoop);
}

function analyzeColor(data) {
    let r=0, g=0;
    for(let i=0; i<data.length; i+=4) {
        if (data[i] > 180 && data[i+1] < 120) r++;
        if (data[i+1] > 180 && data[i] < 150) g++;
    }
    return r > g ? 'red' : g > r ? 'green' : 'unknown';
}

function verifyAndAnnounce(color) {
    signalHistory.push(color);
    if (signalHistory.length > 6) signalHistory.shift();
    const counts = signalHistory.reduce((a, c) => (a[c] = (a[c] || 0) + 1, a), {});
    const final = Object.keys(counts).find(k => counts[k] >= 4 && k !== 'unknown') || 'unknown';

    if (final !== lastConfirmed) {
        lastConfirmed = final;
        if (final === 'green') {
            statusEl.textContent = "초록불";
            borderEl.className = "absolute inset-0 z-20 active-g";
            announce("초록불입니다. 건너가세요.");
            // 초록불: 높은 음 비프음 빠르게
            playBeep(880, 0.1); setTimeout(() => playBeep(880, 0.1), 200);
        } else if (final === 'red') {
            statusEl.textContent = "빨간불";
            borderEl.className = "absolute inset-0 z-20 active-r";
            announce("빨간불입니다. 대기하세요.");
            // 빨간불: 낮은 음 비프음 길게 한번
            playBeep(440, 0.5);
        } else {
            statusEl.textContent = "SCANNING";
            borderEl.className = "";
        }
    }
}

function announce(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ko-KR'; window.speechSynthesis.speak(s);
}
</script>
</body>
</html>
