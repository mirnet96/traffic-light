<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>신호등 알리미 - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        /* 테두리 애니메이션 등 특수 효과만 별도 유지 */
        @keyframes pulse-green { 0%, 100% { box-shadow: inset 0 0 30px #22c55e; } 50% { box-shadow: inset 0 0 80px #22c55e; } }
        @keyframes pulse-red { 0%, 100% { box-shadow: inset 0 0 30px #ef4444; } 50% { box-shadow: inset 0 0 80px #ef4444; } }
        .green-active { border: 15px solid #22c55e; animation: pulse-green 1.5s infinite; }
        .red-active { border: 15px solid #ef4444; animation: pulse-red 1.5s infinite; }
    </style>
</head>
<body class="bg-black text-slate-100 overflow-hidden select-none">
    <div id="app" class="relative h-screen w-screen flex flex-col cursor-pointer">
        <nav class="flex bg-slate-900 border-b border-white/10 z-50">
            <button onclick="switchTab(1)" id="tab1" class="flex-1 py-4 text-sm font-bold text-blue-400 border-b-2 border-blue-500">분석 뷰</button>
            <button onclick="switchTab(2)" id="tab2" class="flex-1 py-4 text-sm font-bold text-slate-500">설정/로그</button>
        </nav>

        <main class="relative flex-1 bg-black">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
            <canvas id="canvas" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>
            
            <div id="border-signal" class="absolute inset-0 pointer-events-none z-20 transition-all"></div>

            <div class="absolute top-4 left-4 right-4 flex justify-between items-center z-30">
                <div id="main-status" class="bg-black/60 backdrop-blur px-4 py-2 rounded-full text-sm font-medium border border-white/20">시스템 대기 중</div>
                <div id="zoom-badge" class="bg-blue-600 px-3 py-1 rounded-lg text-xs font-bold shadow-lg">1.0x</div>
            </div>

            <div class="absolute top-[20%] left-1/2 -translate-x-1/2 bg-black/70 px-4 py-2 rounded-2xl border border-blue-500/50 text-xs text-blue-300 z-10">
                신호등을 화면 상단에 맞춰주세요
            </div>
        </main>

        <footer id="log-panel" class="h-32 bg-slate-950 border-t border-white/10 p-3 overflow-y-auto text-[10px] text-slate-500 font-mono">
            <div>[System] 초기화 대기 중...</div>
        </footer>

        <section id="boot-screen" class="absolute inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-10 text-center">
            <h1 class="text-3xl font-black mb-4 tracking-tighter">TRAFFIC LIGHT <span class="text-blue-500">PRO</span></h1>
            <div class="bg-slate-900 p-6 rounded-2xl mb-8 border border-white/5 shadow-2xl">
                <p class="text-sm text-slate-400 leading-relaxed italic">
                    "반드시 보행로 안쪽에서 사용하세요.<br>기기를 높게 들어 건너편을 비춰주세요."
                </p>
            </div>
            <button onclick="initApp()" class="w-full max-w-xs py-5 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-bold text-xl shadow-[0_10px_20px_rgba(37,99,235,0.4)] transition-all active:scale-95">탐지 시작</button>
        </section>
    </div>

    <script src="app-logic.js"></script>
</body>
</html>
