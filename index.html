<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>신호등 알리미 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
    
    <style>
        @keyframes pulse-green { 0%, 100% { box-shadow: inset 0 0 30px #22c55e; } 50% { box-shadow: inset 0 0 100px #22c55e; } }
        @keyframes pulse-red { 0%, 100% { box-shadow: inset 0 0 30px #ef4444; } 50% { box-shadow: inset 0 0 100px #ef4444; } }
        .active-g { animation: pulse-green 1.5s infinite; border: 16px solid #22c55e !important; }
        .active-r { animation: pulse-red 1.5s infinite; border: 16px solid #ef4444 !important; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden">

<div id="app" class="relative h-screen flex flex-col">
    <div class="flex bg-slate-900 border-b border-white/10 p-4 justify-between items-center z-50">
        <div id="status-badge" class="font-bold text-lg text-blue-400">시스템 대기 중</div>
        <div id="zoom-badge" class="bg-blue-600 px-2 py-1 rounded text-xs font-mono">1.0x</div>
    </div>

    <div class="relative flex-1 bg-black overflow-hidden" id="main-view">
        <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div id="border-overlay" class="absolute inset-0 pointer-events-none z-20 transition-all"></div>
        
        <div class="absolute top-[15%] left-1/2 -translate-x-1/2 px-4 py-2 bg-black/50 border border-blue-500/30 rounded-full text-[10px] text-blue-200 z-10">
            신호등을 화면 위쪽에 맞춰주세요
        </div>
    </div>

    <div class="h-32 bg-slate-950 border-t border-white/10 p-2 overflow-y-auto font-mono text-[10px] text-slate-500" id="logs">
        <div>[System] 초기화 대기...</div>
    </div>

    <div id="boot-layer" class="absolute inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-3xl font-black mb-2">TRAFFIC LIGHT <span class="text-blue-500 text-sm">v2.1</span></h1>
        <p class="text-slate-400 text-xs mb-8">안전을 위해 보도 안쪽에서 사용하세요.</p>
        <button onclick="startSystem()" class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-bold text-xl shadow-lg shadow-blue-900/40 transition-all active:scale-95">
            시스템 활성화
        </button>
    </div>
</div>

<script>
let net = null, stream = null, isReady = false;
let curSignal = 'unknown', zoomVal = 1.0, zoomTimer = null;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const statusEl = document.getElementById('status-badge');
const borderEl = document.getElementById('border-overlay');
const zoomEl = document.getElementById('zoom-badge');
const logEl = document.getElementById('logs');

function addLog(m) {
    const d = new Date().toLocaleTimeString();
    logEl.innerHTML = `<div>[${d}] ${m}</div>` + logEl.innerHTML;
}

function speak(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ko-KR';
    window.speechSynthesis.speak(s);
}

// 줌 기능 (삼성 인터넷/안드로이드 크롬 최적화)
async function setZoom(v) {
    if (!stream) return;
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities();
    if (caps.zoom) {
        const target = Math.max(caps.zoom.min, Math.min(v, caps.zoom.max));
        await track.applyConstraints({ advanced: [{ zoom: target }] });
        zoomVal = target;
        zoomEl.textContent = `${zoomVal.toFixed(1)}x`;
    }
}

async function startSystem() {
    document.getElementById('boot-layer').style.display = 'none';
    addLog("카메라 연결 시도...");
    
    try {
        // 카메라 권한 및 스트림 획득
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', focusMode: 'continuous' },
            audio: false
        });
        video.srcObject = stream;
        
        // 모델 로드 시작
        statusEl.textContent = "AI 엔진 로드 중...";
        addLog("AI 모델 다운로드 중 (약 20MB)...");
        net = await cocoSsd.load();
        
        isReady = true;
        statusEl.textContent = "탐색 활성화";
        addLog("시스템 정상 작동 시작.");
        speak("탐지를 시작합니다. 기기를 높게 들어주세요.");
        
        detectLoop();
    } catch (e) {
        addLog("에러: " + e.message);
        alert("카메라를 켤 수 없습니다. (HTTPS 연결 및 권한 확인 필요)");
    }
}

async function detectLoop() {
    if (!isReady) return;

    // 캔버스 크기 맞춤
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const preds = await net.detect(video);
    const light = preds.find(p => p.class === 'traffic light' && p.score > 0.3);

    // 자동 줌 로직
    if (!light && !zoomTimer) {
        zoomTimer = setInterval(() => {
            if (zoomVal < 3.0) setZoom(zoomVal + 0.5);
            else setZoom(1.0);
        }, 4000);
    } else if (light && zoomTimer) {
        clearInterval(zoomTimer);
        zoomTimer = null;
    }

    if (light) {
        const [x, y, w, h] = light.bbox;
        ctx.drawImage(video, x, y, w, h, 0, 0, 100, 100);
        const data = ctx.getImageData(0, 0, 100, 100).data;
        
        let r=0, g=0;
        for(let i=0; i<data.length; i+=4) {
            if (data[i] > 150 && data[i+1] < 100) r++;
            if (data[i+1] > 150 && data[i] < 150) g++;
        }
        
        let result = r > g ? 'red' : g > r ? 'green' : 'unknown';
        updateStatus(result);
    } else {
        updateStatus('unknown');
    }

    requestAnimationFrame(detectLoop);
}

function updateStatus(c) {
    if (c === curSignal) return;
    curSignal = c;

    if (c === 'green') {
        statusEl.textContent = "초록불";
        statusEl.className = "font-bold text-lg text-green-500";
        borderEl.className = "absolute inset-0 z-20 active-g";
        speak("초록불입니다. 건너가세요.");
    } else if (c === 'red') {
        statusEl.textContent = "빨간불";
        statusEl.className = "font-bold text-lg text-red-500";
        borderEl.className = "absolute inset-0 z-20 active-r";
        speak("빨간불입니다. 대기하세요.");
    } else {
        statusEl.textContent = "탐색 중";
        statusEl.className = "font-bold text-lg text-blue-400";
        borderEl.className = "absolute inset-0 z-20";
    }
}

// 화면 터치 시 줌 리셋 및 재안내
document.body.addEventListener('click', () => {
    if(!isReady) return;
    setZoom(1.0);
    addLog("줌 초기화");
});
</script>
</body>
</html>
