<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="мӢ нҳёл“ұ м•ҢлҰ¬лҜё">
<title>мӢ нҳёл“ұ м•ҢлҰ¬лҜё</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --red-bg: #7f1d1d;
    --red-bright: #ef4444;
    --green-bg: #14532d;
    --green-bright: #22c55e;
    --gray-bg: #1e1e2e;
    --gray-surface: #2a2a3e;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--gray-bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    user-select: none;
  }

  /* в”Җв”Җ м „мІҙ л Ҳмқҙм•„мӣғ в”Җв”Җ */
  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    transition: background 0.4s;
  }
  #app.green { background: var(--green-bg); }
  #app.red   { background: var(--red-bg); }

  /* в”Җв”Җ мғҒнғң л°°л„Ҳ (нҷ”л©ҙ мғҒлӢЁ 40%) в”Җв”Җ */
  #banner {
    flex: 0 0 42%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 20px;
    position: relative;
  }
  #signal-emoji { font-size: 72px; line-height: 1; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); }
  #signal-text  { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; }
  #signal-sub   { font-size: 16px; color: rgba(255,255,255,0.6); }
  #countdown    {
    font-size: 56px; font-weight: 700; letter-spacing: -2px;
    color: rgba(255,255,255,0.9);
    min-height: 68px;
    display: flex; align-items: center; justify-content: center;
  }
  #countdown.urgent { color: #fbbf24; animation: pulse 0.5s ease-in-out infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

  /* в”Җв”Җ м№ҙл©”лқј мҳҒм—ӯ в”Җв”Җ */
  #cam-section {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  #detect-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* к°җм§Җ мғҒнғң м№© */
  #detect-chip {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
    color: rgba(255,255,255,0.8); font-size: 13px;
    padding: 6px 16px; border-radius: 20px;
    white-space: nowrap; max-width: 90%;
    text-align: center;
  }

  /* в”Җв”Җ мӢңмһ‘ мҳӨлІ„л Ҳмқҙ в”Җв”Җ */
  #start-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 24px;
    text-align: center;
  }
  #start-overlay h2 { font-size: 22px; font-weight: 600; }
  #start-overlay p  { font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.6; }
  #btn-start {
    background: #22c55e; color: #fff;
    border: none; border-radius: 14px;
    font-size: 18px; font-weight: 700;
    padding: 16px 40px; cursor: pointer;
    width: 100%; max-width: 280px;
    transition: opacity 0.15s;
  }
  #btn-start:active { opacity: 0.8; }
  #btn-test-row {
    display: flex; gap: 10px; width: 100%; max-width: 280px;
  }
  #btn-test-row button {
    flex: 1; padding: 12px 8px;
    border-radius: 10px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  #btn-t-red   { background: #ef4444; color: #fff; }
  #btn-t-green { background: #22c55e; color: #fff; }

  /* в”Җв”Җ н•ҳлӢЁ м»ЁнҠёлЎӨ л°” в”Җв”Җ */
  #control-bar {
    flex: 0 0 auto;
    display: none;
    background: rgba(0,0,0,0.4);
    padding: 12px 16px;
    gap: 0;
  }
  #control-bar.visible { display: flex; align-items: center; gap: 12px; }
  .ctrl-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.5); font-size: 10px; padding: 8px 4px;
    border-radius: 8px; transition: background 0.15s;
  }
  .ctrl-btn:active { background: rgba(255,255,255,0.1); }
  .ctrl-btn.active { color: #22c55e; }
  .ctrl-icon { font-size: 22px; line-height: 1; }
  #btn-stop-cam {
    flex: 0 0 auto; background: rgba(239,68,68,0.2);
    border: 1px solid rgba(239,68,68,0.4);
    color: #ef4444; font-size: 13px; font-weight: 600;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
  }

  /* в”Җв”Җ лӘЁлҚё лЎңл”© л°” в”Җв”Җ */
  #model-bar {
    position: absolute; top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.7);
    color: rgba(255,255,255,0.7); font-size: 12px;
    padding: 6px 12px; text-align: center;
    display: none;
  }
  #model-bar.visible { display: block; }
</style>
</head>
<body>

<div id="app">

  <!-- мғҒлӢЁ л°°л„Ҳ -->
  <div id="banner">
    <div id="signal-emoji">н ҪнҙҚ</div>
    <div id="signal-text">мӢ нҳёл“ұ м•ҢлҰ¬лҜё</div>
    <div id="signal-sub">м№ҙл©”лқјлҘј мӢ нҳёл“ұ л°©н–ҘмңјлЎң</div>
    <div id="countdown"></div>
  </div>

  <!-- м№ҙл©”лқј -->
  <div id="cam-section">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="detect-canvas"></canvas>
    <div id="model-bar">AI лӘЁлҚё лЎңл”© мӨ‘...</div>
    <div id="detect-chip">м№ҙл©”лқјлҘј мӢңмһ‘н•ҳм„ёмҡ”</div>

    <!-- мӢңмһ‘ м „ мҳӨлІ„л Ҳмқҙ -->
    <div id="start-overlay">
      <h2>н ҪнәҰ мӢ нҳёл“ұ м•ҢлҰ¬лҜё</h2>
      <p>м№ҙл©”лқјлҘј кұҙл„ҲнҺё мӢ нҳёл“ұ л°©н–ҘмңјлЎң<br>н–Ҙн•ҳл©ҙ мһҗлҸҷмңјлЎң к°җм§Җн•©лӢҲлӢӨ.</p>
      <button id="btn-start" onclick="startCamera()">м№ҙл©”лқј мӢңмһ‘</button>
      <div id="btn-test-row">
        <button id="btn-t-red"   onclick="triggerSignal('red',30)">н Ҫнҙҙ л№Ёк°„л¶Ҳ н…ҢмҠӨнҠё</button>
        <button id="btn-t-green" onclick="triggerSignal('green',25)">н Ҫнҝў мҙҲлЎқл¶Ҳ н…ҢмҠӨнҠё</button>
      </div>
    </div>
  </div>

  <!-- н•ҳлӢЁ м»ЁнҠёлЎӨ -->
  <div id="control-bar">
    <button class="ctrl-btn active" id="ctrl-voice" onclick="toggleCtrl(this,'voice')" aria-label="мқҢм„ұ м•ҲлӮҙ">
      <span class="ctrl-icon">н ҪнҙҠ</span>
      <span>мқҢм„ұ</span>
    </button>
    <button class="ctrl-btn active" id="ctrl-vib" onclick="toggleCtrl(this,'vib')" aria-label="м§„лҸҷ">
      <span class="ctrl-icon">н Ҫніі</span>
      <span>м§„лҸҷ</span>
    </button>
    <button class="ctrl-btn active" id="ctrl-count" onclick="toggleCtrl(this,'count')" aria-label="м№ҙмҡҙнҠёлӢӨмҡҙ">
      <span class="ctrl-icon">вҸұ</span>
      <span>м№ҙмҡҙнҠё</span>
    </button>
    <button class="ctrl-btn active" id="ctrl-box" onclick="toggleCtrl(this,'box')" aria-label="мң„м№ҳ н‘ңмӢң">
      <span class="ctrl-icon">н ҪніҰ</span>
      <span>мң„м№ҳн‘ңмӢң</span>
    </button>
    <button id="btn-stop-cam" onclick="stopCamera()">мӨ‘м§Җ</button>
  </div>

</div>

<!-- TensorFlow.js -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<script>

const app        = document.getElementById('app');
const video      = document.getElementById('video');
const dcv        = document.getElementById('detect-canvas');
const dctx       = dcv.getContext('2d');
const banner     = document.getElementById('banner');
const sigEmoji   = document.getElementById('signal-emoji');
const sigText    = document.getElementById('signal-text');
const sigSub     = document.getElementById('signal-sub');
const cdEl       = document.getElementById('countdown');
const chipEl     = document.getElementById('detect-chip');
const modelBar   = document.getElementById('model-bar');
const controlBar = document.getElementById('control-bar');
const overlay    = document.getElementById('start-overlay');

let opts = { voice:true, vib:true, count:true, box:true };
let stream=null, detector=null, loopId=null;
let currentSignal='unknown', countdownVal=0, countdownTimer=null;
let noDetectCount=0, modelReady=false;
const MISS_LIMIT = 45;

// в”Җв”Җ лӘЁлҚё лЎңл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadModel() {
  try {
    modelBar.classList.add('visible');
    modelBar.textContent = 'AI мӢ нҳёл“ұ мқёмӢқ мӨҖл№„ мӨ‘...';
    detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
    modelReady = true;
    modelBar.textContent = 'вң… AI лӘЁлҚё мӨҖл№„ мҷ„лЈҢ';
    setTimeout(() => modelBar.classList.remove('visible'), 2000);
  } catch(e) {
    modelReady = false;
    modelBar.textContent = 'мғүмғҒ л¶„м„қ лӘЁл“ңлЎң лҸҷмһ‘н•©лӢҲлӢӨ';
    setTimeout(() => modelBar.classList.remove('visible'), 3000);
  }
}
loadModel();

// в”Җв”Җ мҳөм…ҳ нҶ кёҖ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function toggleCtrl(btn, key) {
  opts[key] = !opts[key];
  btn.classList.toggle('active', opts[key]);
}

// в”Җв”Җ м№ҙл©”лқј мӢңмһ‘/мӨ‘м§Җ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });

    overlay.style.display = 'none';
    controlBar.classList.add('visible');
    chipEl.textContent = 'мӢ нҳёл“ұ нғҗмғү мӨ‘...';

    requestAnimationFrame(detectLoop);
  } catch(e) {
    alert('м№ҙл©”лқјлҘј мӮ¬мҡ©н•  мҲҳ м—ҶмҠөлӢҲлӢӨ.\n' + e.message + '\n\nн…ҢмҠӨнҠё лІ„нҠјмңјлЎң м•ҢлҰјмқ„ нҷ•мқён•ҙліҙм„ёмҡ”.');
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  if (loopId) cancelAnimationFrame(loopId);
  controlBar.classList.remove('visible');
  overlay.style.display = 'flex';
  clearState();
  chipEl.textContent = 'м№ҙл©”лқјлҘј мӢңмһ‘н•ҳм„ёмҡ”';
}

// в”Җв”Җ к°җм§Җ лЈЁн”„ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function detectLoop() {
  if (!stream) return;

  if (video.readyState >= 2) {
    // мә”лІ„мҠӨ нҒ¬кё° лҸҷкё°нҷ”
    const vr = video.getBoundingClientRect();
    dcv.width  = Math.floor(vr.width);
    dcv.height = Math.floor(vr.height);

    if (modelReady && detector) {
      await detectAI();
    } else {
      detectColor();
    }
  }
  loopId = requestAnimationFrame(detectLoop);
}

// в”Җв”Җ AI к°җм§Җ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function detectAI() {
  let preds;
  try { preds = await detector.detect(video); } catch(e) { return; }

  dctx.clearRect(0, 0, dcv.width, dcv.height);

  const lights = preds.filter(p => p.class === 'traffic light' && p.score > 0.45);

  if (lights.length === 0) {
    noDetectCount++;
    if (noDetectCount > MISS_LIMIT && currentSignal !== 'unknown') clearState();
    chipEl.textContent = 'мӢ нҳёл“ұ нғҗмғү мӨ‘...';
    return;
  }

  noDetectCount = 0;

  // к°ҖмһҘ нҒ¬кі  к°Җк№Ңмҡҙ мӢ нҳёл“ұ
  const best = lights.sort((a,b) => b.bbox[2]*b.bbox[3] - a.bbox[2]*a.bbox[3])[0];
  const [bx,by,bw,bh] = best.bbox;

  // мғүмғҒ л¶„м„қ
  const tmpC = document.createElement('canvas');
  tmpC.width  = video.videoWidth;
  tmpC.height = video.videoHeight;
  const tmpX  = tmpC.getContext('2d');
  tmpX.drawImage(video, 0, 0);
  const color = analyzeRegion(tmpX, bx, by, bw, bh);

  // л°•мҠӨ л ҢлҚ”л§Ғ
  if (opts.box) {
    const sx = dcv.width  / video.videoWidth;
    const sy = dcv.height / video.videoHeight;
    const col = color==='green'?'#22c55e':color==='red'?'#ef4444':'#94a3b8';

    dctx.strokeStyle = col;
    dctx.lineWidth   = 3;
    dctx.beginPath();
    dctx.roundRect(bx*sx, by*sy, bw*sx, bh*sy, 8);
    dctx.stroke();

    // л Ҳмқҙлё” л°°кІҪ
    dctx.fillStyle = col;
    dctx.beginPath();
    dctx.roundRect(bx*sx, by*sy - 26, 100, 22, 4);
    dctx.fill();
    dctx.fillStyle = '#fff';
    dctx.font = 'bold 12px system-ui';
    dctx.fillText(
      color==='green'?'н Ҫнҝў мҙҲлЎқл¶Ҳ':color==='red'?'н Ҫнҙҙ л№Ёк°„л¶Ҳ':'н ҪнҙҚ мӢ нҳёл“ұ',
      bx*sx + 6, by*sy - 9
    );

    // нҷ•мӢ лҸ„
    dctx.fillStyle = 'rgba(0,0,0,0.55)';
    dctx.beginPath();
    dctx.roundRect(bx*sx, (by+bh)*sy + 2, 90, 18, 4);
    dctx.fill();
    dctx.fillStyle = 'rgba(255,255,255,0.8)';
    dctx.font = '11px system-ui';
    dctx.fillText(`${Math.round(best.score*100)}% нҷ•мӢ `, bx*sx + 6, (by+bh)*sy + 15);
  }

  chipEl.textContent = `мӢ нҳёл“ұ к°җм§Җ (${Math.round(best.score*100)}% нҷ•мӢ )`;

  if (color !== 'unknown' && color !== currentSignal) {
    triggerSignal(color, color==='green'?25:30);
  }
}

// в”Җв”Җ мғүмғҒ м „мҡ© к°җм§Җ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function detectColor() {
  const tmpC = document.createElement('canvas');
  tmpC.width  = video.videoWidth;
  tmpC.height = video.videoHeight;
  const tmpX  = tmpC.getContext('2d');
  tmpX.drawImage(video, 0, 0);

  const w = video.videoWidth, h = video.videoHeight;
  const color = analyzeRegion(tmpX, w*0.1, 0, w*0.8, h*0.65);

  noDetectCount = color==='unknown' ? noDetectCount+1 : 0;
  if (noDetectCount > MISS_LIMIT && currentSignal !== 'unknown') clearState();

  chipEl.textContent = color==='unknown'
    ? 'мӢ нҳёл“ұ нғҗмғү мӨ‘...'
    : (color==='green'?'н Ҫнҝў мҙҲлЎқл¶Ҳ к°җм§Җ':'н Ҫнҙҙ л№Ёк°„л¶Ҳ к°җм§Җ');

  if (color !== 'unknown' && color !== currentSignal) {
    triggerSignal(color, color==='green'?25:30);
  }
}

// в”Җв”Җ HSL мғүмғҒ л¶„м„қ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function analyzeRegion(ctx, x, y, w, h) {
  x = Math.max(0, Math.floor(x));
  y = Math.max(0, Math.floor(y));
  w = Math.min(Math.floor(w), ctx.canvas.width  - x);
  h = Math.min(Math.floor(h), ctx.canvas.height - y);
  if (w <= 0 || h <= 0) return 'unknown';

  const data   = ctx.getImageData(x, y, w, h).data;
  let red=0, green=0, total=0;

  for (let i = 0; i < data.length; i += 4) {
    const r=data[i], g=data[i+1], b=data[i+2], a=data[i+3];
    if (a < 100) continue;
    total++;
    const mx = Math.max(r,g,b);
    if (mx < 60) continue;
    const sat = mx > 0 ? (mx - Math.min(r,g,b)) / mx : 0;
    if (sat < 0.3) continue;

    // Hue кі„мӮ°
    const nr=r/255, ng=g/255, nb=b/255;
    const nmx=Math.max(nr,ng,nb), nmn=Math.min(nr,ng,nb), delta=nmx-nmn;
    if (delta === 0) continue;
    let hue;
    if      (nmx===nr) hue = ((ng-nb)/delta) % 6;
    else if (nmx===ng) hue = (nb-nr)/delta + 2;
    else               hue = (nr-ng)/delta + 4;
    hue = hue * 60; if (hue < 0) hue += 360;

    if ((hue <= 20 || hue >= 340) && r > 100) red++;
    if (hue >= 85  && hue <= 155  && g > 100) green++;
  }

  if (total < 100) return 'unknown';
  const th = 0.02;
  if (red   > green * 2 && red   / total > th) return 'red';
  if (green > red  * 1.5 && green / total > th) return 'green';
  return 'unknown';
}

// в”Җв”Җ мӢ нҳё мІҳлҰ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function triggerSignal(color, seconds) {
  currentSignal = color;
  applyBanner(color, seconds);
  if (opts.voice) speak(color);
  if (opts.vib)   vibrate(color);
}

function applyBanner(color, seconds) {
  clearInterval(countdownTimer);
  app.className  = color;

  if (color === 'green') {
    sigEmoji.textContent = 'н Ҫнҝў';
    sigText.textContent  = 'кұҙл„Ҳм„ёмҡ”';
    sigSub.textContent   = 'мҙҲлЎқл¶Ҳмһ…лӢҲлӢӨ';
  } else {
    sigEmoji.textContent = 'н Ҫнҙҙ';
    sigText.textContent  = 'л©Ҳм¶”м„ёмҡ”';
    sigSub.textContent   = 'л№Ёк°„л¶Ҳмһ…лӢҲлӢӨ';
  }

  if (opts.count && seconds > 0) {
    countdownVal = seconds;
    cdEl.textContent = countdownVal + 'мҙҲ';
    cdEl.classList.remove('urgent');
    countdownTimer = setInterval(() => {
      countdownVal--;
      if (countdownVal <= 0) {
        clearInterval(countdownTimer);
        cdEl.textContent = '';
        cdEl.classList.remove('urgent');
      } else {
        cdEl.textContent = countdownVal + 'мҙҲ';
        cdEl.classList.toggle('urgent', countdownVal <= 5);
        if (countdownVal <= 5 && opts.vib) {
          navigator.vibrate && navigator.vibrate(80);
        }
      }
    }, 1000);
  }
}

function clearState() {
  currentSignal = 'unknown';
  clearInterval(countdownTimer);
  app.className        = '';
  sigEmoji.textContent = 'н ҪнҙҚ';
  sigText.textContent  = 'мӢ нҳёл“ұ нғҗмғү мӨ‘';
  sigSub.textContent   = 'м№ҙл©”лқјлҘј мӢ нҳёл“ұ л°©н–ҘмңјлЎң';
  cdEl.textContent     = '';
  cdEl.classList.remove('urgent');
}

// в”Җв”Җ мқҢм„ұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let voicesLoaded = false;
function speak(color) {
  if (!opts.voice || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const msg = color==='green' ? 'мҙҲлЎқл¶Ҳмһ…лӢҲлӢӨ. кұҙл„Ҳм„ёмҡ”.' : 'л№Ёк°„л¶Ҳмһ…лӢҲлӢӨ. л©Ҳм¶”м„ёмҡ”.';
  const u   = new SpeechSynthesisUtterance(msg);
  u.lang    = 'ko-KR';
  u.rate    = 0.9;
  u.volume  = 1;
  const voices = window.speechSynthesis.getVoices();
  const ko     = voices.find(v => v.lang.startsWith('ko'));
  if (ko) u.voice = ko;
  window.speechSynthesis.speak(u);
}

// в”Җв”Җ м§„лҸҷ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function vibrate(color) {
  if (!opts.vib || !navigator.vibrate) return;
  navigator.vibrate(
    color === 'green'
      ? [200, 100, 200]             // м§§кІҢ 2лІҲ
      : [500, 150, 500, 150, 500]   // кёёкІҢ 3лІҲ
  );
}

// мқҢм„ұ лӘ©лЎқ лҜёлҰ¬ лЎңл“ң
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  speechSynthesis.getVoices();
}
</script>
