<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="신호등 알리미">
<title>신호등 알리미</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --red-bg: #7f1d1d;
  --green-bg: #14532d;
  --dark-bg: #0f0f1a;
}
html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--dark-bg);
  color: #f1f5f9;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  user-select: none;
}

/* ── 전체 레이아웃: 카메라 최대화 ── */
#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── 카메라 (화면 전체) ── */
#cam-section {
  flex: 1;
  position: relative;
  background: #000;
  overflow: hidden;
}
#video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
#detect-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* ── 상태 배너: 카메라 위에 오버레이 ── */
#banner {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  padding: 14px 16px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  transition: background 0.3s;
  background: rgba(15,15,26,0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
#banner.green { background: rgba(20,83,45,0.88); }
#banner.red   { background: rgba(127,29,29,0.88); }

#banner-row {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
}
#signal-emoji { font-size: 40px; line-height: 1; flex-shrink: 0; }
#signal-info  { flex: 1; }
#signal-text  { font-size: 28px; font-weight: 700; line-height: 1.1; }
#signal-sub   { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 2px; }
#countdown {
  font-size: 40px; font-weight: 700;
  color: rgba(255,255,255,0.9);
  min-width: 72px; text-align: right;
  flex-shrink: 0;
}
#countdown.urgent {
  color: #fbbf24;
  animation: pulse 0.5s ease-in-out infinite alternate;
}
@keyframes pulse { from { opacity:1; } to { opacity:0.4; } }

/* ── 감지 칩 (하단) ── */
#detect-chip {
  position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
  z-index: 10;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  color: rgba(255,255,255,0.75); font-size: 13px;
  padding: 6px 16px; border-radius: 20px;
  white-space: nowrap;
}

/* ── 하단 컨트롤 바 ── */
#control-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-around;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 8px 12px 20px;
  gap: 4px;
}
.ctrl-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.35);
  font-size: 10px; padding: 8px 10px;
  border-radius: 10px; transition: all 0.15s;
  min-width: 52px;
}
.ctrl-btn:active { background: rgba(255,255,255,0.1); }
.ctrl-btn.active { color: #22c55e; }
.ctrl-icon { font-size: 20px; line-height: 1; }
#btn-stop-cam {
  background: rgba(239,68,68,0.2);
  border: 1px solid rgba(239,68,68,0.5);
  color: #ef4444; font-size: 13px; font-weight: 600;
  padding: 10px 16px; border-radius: 10px; cursor: pointer;
}

/* ── 시작 오버레이 ── */
#start-overlay {
  position: absolute; inset: 0; z-index: 20;
  background: rgba(0,0,0,0.88);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; padding: 28px;
  text-align: center;
}
#start-overlay h2 { font-size: 24px; font-weight: 700; }
#start-overlay p  { font-size: 15px; color: rgba(255,255,255,0.55); line-height: 1.7; }
#btn-start {
  background: #22c55e; color: #fff;
  border: none; border-radius: 14px;
  font-size: 18px; font-weight: 700;
  padding: 18px 0; cursor: pointer;
  width: 100%; max-width: 300px;
}
#btn-start:active { opacity: 0.8; }
.test-row {
  display: flex; gap: 10px; width: 100%; max-width: 300px;
}
.test-row button {
  flex: 1; padding: 14px 8px;
  border-radius: 10px; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer;
}
#btn-t-red   { background: #dc2626; color: #fff; }
#btn-t-green { background: #16a34a; color: #fff; }

/* ── AI 모델 상태 ── */
#model-bar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 30;
  background: rgba(0,0,0,0.8);
  color: rgba(255,255,255,0.7); font-size: 13px;
  padding: 10px; text-align: center;
  display: none;
}
#model-bar.visible { display: block; }
</style>
</head>
<body>
<div id="app">

  <!-- 카메라 (전체 화면) -->
  <div id="cam-section">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="detect-canvas"></canvas>
  </div>

  <!-- 상단 배너 (오버레이) -->
  <div id="banner">
    <div id="banner-row">
      <div id="signal-emoji">🔍</div>
      <div id="signal-info">
        <div id="signal-text">신호등 알리미</div>
        <div id="signal-sub">카메라를 신호등 방향으로 향하세요</div>
      </div>
      <div id="countdown"></div>
    </div>
  </div>

  <!-- 감지 칩 -->
  <div id="detect-chip">카메라를 시작하세요</div>

  <!-- 하단 컨트롤 -->
  <div id="control-bar" style="display:none">
    <button class="ctrl-btn active" id="ctrl-voice" onclick="toggleCtrl(this,'voice')">
      <span class="ctrl-icon">🔊</span><span>음성</span>
    </button>
    <button class="ctrl-btn active" id="ctrl-vib" onclick="toggleCtrl(this,'vib')">
      <span class="ctrl-icon">📳</span><span>진동</span>
    </button>
    <button class="ctrl-btn active" id="ctrl-count" onclick="toggleCtrl(this,'count')">
      <span class="ctrl-icon">⏱</span><span>카운트</span>
    </button>
    <button class="ctrl-btn active" id="ctrl-box" onclick="toggleCtrl(this,'box')">
      <span class="ctrl-icon">🔲</span><span>위치표시</span>
    </button>
    <button id="btn-stop-cam" onclick="stopCamera()">중지</button>
  </div>

  <!-- 시작 오버레이 -->
  <div id="start-overlay">
    <div style="font-size:56px">🚦</div>
    <h2>신호등 알리미</h2>
    <p>카메라를 건너편 신호등 방향으로<br>향하면 자동으로 감지합니다.<br><br>
    신호가 바뀔 때마다 음성·진동·<br>화면으로 즉시 알려드립니다.</p>
    <button id="btn-start" onclick="startCamera()">📷 카메라 시작</button>
    <div class="test-row">
      <button id="btn-t-red"   onclick="triggerSignal('red',30)">🔴 빨간불</button>
      <button id="btn-t-green" onclick="triggerSignal('green',25)">🟢 초록불</button>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,0.3)">위 버튼으로 알림 방식을 먼저 확인해보세요</div>
  </div>

  <!-- 모델 로딩 -->
  <div id="model-bar">AI 모델 로딩 중...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<script>
const video      = document.getElementById('video');
const dcv        = document.getElementById('detect-canvas');
const dctx       = dcv.getContext('2d');
const banner     = document.getElementById('banner');
const sigEmoji   = document.getElementById('signal-emoji');
const sigText    = document.getElementById('signal-text');
const sigSub     = document.getElementById('signal-sub');
const cdEl       = document.getElementById('countdown');
const chipEl     = document.getElementById('detect-chip');
const modelBar   = document.getElementById('model-bar');
const controlBar = document.getElementById('control-bar');
const startOvl   = document.getElementById('start-overlay');

let opts = { voice:true, vib:true, count:true, box:true };
let stream=null, detector=null, loopId=null;
let currentSignal = 'unknown';
let countdownVal  = 0;
let countdownTimer = null;
let modelReady = false;

// ── 신호 안정화 변수 ──────────────────────────────────────
// 연속 N프레임 이상 같은 색이 감지되어야 신호로 인정
let pendingSignal  = 'unknown';
let pendingFrames  = 0;
const CONFIRM_FRAMES = 4;   // 확정에 필요한 연속 프레임 수

// 신호등이 안 보이면 N프레임 후 unknown 리셋
let missFrames = 0;
const MISS_LIMIT = 20;      // ← 기존 45에서 20으로 단축 (빠른 리셋)

// ── 모델 로드 ─────────────────────────────────────────────
async function loadModel() {
  try {
    modelBar.classList.add('visible');
    modelBar.textContent = 'AI 신호등 인식 모델 준비 중...';
    detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
    modelReady = true;
    modelBar.textContent = '✅ AI 모델 준비 완료';
    setTimeout(() => modelBar.classList.remove('visible'), 2000);
  } catch(e) {
    modelReady = false;
    modelBar.textContent = '색상 분석 모드로 동작합니다';
    setTimeout(() => modelBar.classList.remove('visible'), 2500);
  }
}
loadModel();

// ── 옵션 토글 ─────────────────────────────────────────────
function toggleCtrl(btn, key) {
  opts[key] = !opts[key];
  btn.classList.toggle('active', opts[key]);
}

// ── 카메라 시작/중지 ──────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    startOvl.style.display = 'none';
    controlBar.style.display = 'flex';
    chipEl.textContent = '신호등 탐색 중...';
    requestAnimationFrame(detectLoop);
  } catch(e) {
    alert('카메라를 사용할 수 없습니다.\n' + e.message + '\n\n테스트 버튼으로 알림을 확인해보세요.');
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  if (loopId) cancelAnimationFrame(loopId);
  controlBar.style.display = 'none';
  startOvl.style.display   = 'flex';
  resetSignalState();
  chipEl.textContent = '카메라를 시작하세요';
}

// ── 감지 루프 ─────────────────────────────────────────────
async function detectLoop() {
  if (!stream) return;
  if (video.readyState >= 2) {
    // 캔버스 크기 동기화
    const vr = video.getBoundingClientRect();
    if (dcv.width  !== Math.floor(vr.width) ||
        dcv.height !== Math.floor(vr.height)) {
      dcv.width  = Math.floor(vr.width);
      dcv.height = Math.floor(vr.height);
    }
    if (modelReady && detector) await detectAI();
    else detectColor();
  }
  loopId = requestAnimationFrame(detectLoop);
}

// ── AI 감지 ───────────────────────────────────────────────
async function detectAI() {
  let preds;
  try { preds = await detector.detect(video); } catch(e) { return; }
  dctx.clearRect(0, 0, dcv.width, dcv.height);

  const lights = preds.filter(p => p.class === 'traffic light' && p.score > 0.4);

  if (lights.length === 0) {
    handleMiss();
    chipEl.textContent = '신호등 탐색 중...';
    return;
  }

  missFrames = 0;
  const best  = lights.sort((a,b) => b.bbox[2]*b.bbox[3] - a.bbox[2]*a.bbox[3])[0];
  const [bx,by,bw,bh] = best.bbox;

  // 색상 분석
  const tmp  = document.createElement('canvas');
  tmp.width  = video.videoWidth;
  tmp.height = video.videoHeight;
  const tx   = tmp.getContext('2d');
  tx.drawImage(video, 0, 0);
  const color = analyzeRegion(tx, bx, by, bw, bh);

  // 박스 그리기
  if (opts.box) drawBox(bx, by, bw, bh, color, best.score);

  chipEl.textContent = `신호등 감지 (${Math.round(best.score*100)}% 확신)`;

  // ✅ 핵심 수정: 안정화 로직
  stabilizeAndFire(color);
}

// ── 색상 전용 감지 ────────────────────────────────────────
function detectColor() {
  const tmp  = document.createElement('canvas');
  tmp.width  = video.videoWidth;
  tmp.height = video.videoHeight;
  const tx   = tmp.getContext('2d');
  tx.drawImage(video, 0, 0);

  const w = video.videoWidth, h = video.videoHeight;
  const color = analyzeRegion(tx, w*0.05, 0, w*0.9, h*0.7);

  dctx.clearRect(0, 0, dcv.width, dcv.height);

  if (color === 'unknown') {
    handleMiss();
    chipEl.textContent = '신호등 탐색 중...';
  } else {
    missFrames = 0;
    chipEl.textContent = color==='green' ? '🟢 초록불 감지' : '🔴 빨간불 감지';
    stabilizeAndFire(color);
  }
}

// ── 핵심 수정: 신호 안정화 + 재인식 로직 ─────────────────
function stabilizeAndFire(detected) {
  if (detected === pendingSignal) {
    pendingFrames++;
  } else {
    // 다른 색 감지 시 카운터 초기화
    pendingSignal = detected;
    pendingFrames = 1;
  }

  // CONFIRM_FRAMES 연속 감지되면 확정
  if (pendingFrames >= CONFIRM_FRAMES) {
    if (detected !== currentSignal) {
      // ✅ 이전 신호와 달라야 트리거 (unknown 경유 없이 바로 전환 가능)
      currentSignal = detected;
      triggerSignal(detected, detected==='green' ? 25 : 30);
    }
  }
}

// ── 신호등 없음 처리 ──────────────────────────────────────
function handleMiss() {
  missFrames++;
  pendingSignal  = 'unknown';
  pendingFrames  = 0;
  if (missFrames >= MISS_LIMIT) {
    // ✅ 충분히 사라지면 상태 리셋 → 다시 감지 준비
    if (currentSignal !== 'unknown') {
      resetSignalState();
    }
    missFrames = 0;
  }
}

// ── 상태 리셋 ─────────────────────────────────────────────
function resetSignalState() {
  currentSignal  = 'unknown';
  pendingSignal  = 'unknown';
  pendingFrames  = 0;
  missFrames     = 0;
  clearInterval(countdownTimer);
  banner.className      = '';
  sigEmoji.textContent  = '🔍';
  sigText.textContent   = '신호등 탐색 중';
  sigSub.textContent    = '카메라를 신호등 방향으로 향하세요';
  cdEl.textContent      = '';
  cdEl.classList.remove('urgent');
}

// ── 신호 트리거 ───────────────────────────────────────────
function triggerSignal(color, seconds) {
  applyBanner(color, seconds);
  if (opts.voice) speak(color);
  if (opts.vib)   vibrate(color);
}

function applyBanner(color, seconds) {
  clearInterval(countdownTimer);
  banner.className = color;

  if (color === 'green') {
    sigEmoji.textContent = '🟢';
    sigText.textContent  = '건너세요';
    sigSub.textContent   = '초록불입니다';
  } else {
    sigEmoji.textContent = '🔴';
    sigText.textContent  = '멈추세요';
    sigSub.textContent   = '빨간불입니다';
  }

  if (opts.count && seconds > 0) {
    countdownVal = seconds;
    cdEl.textContent = countdownVal + '초';
    cdEl.classList.remove('urgent');

    countdownTimer = setInterval(() => {
      countdownVal--;
      if (countdownVal <= 0) {
        clearInterval(countdownTimer);
        cdEl.textContent = '';
        cdEl.classList.remove('urgent');
      } else {
        cdEl.textContent = countdownVal + '초';
        cdEl.classList.toggle('urgent', countdownVal <= 5);
        if (countdownVal <= 5 && opts.vib) {
          navigator.vibrate && navigator.vibrate(80);
        }
      }
    }, 1000);
  } else {
    cdEl.textContent = '';
  }
}

// ── 박스 그리기 ───────────────────────────────────────────
function drawBox(bx, by, bw, bh, color, score) {
  const sx = dcv.width  / video.videoWidth;
  const sy = dcv.height / video.videoHeight;
  const col = color==='green'?'#22c55e' : color==='red'?'#ef4444' : '#94a3b8';

  dctx.strokeStyle = col;
  dctx.lineWidth   = 3;
  dctx.beginPath();
  dctx.roundRect(bx*sx, by*sy, bw*sx, bh*sy, 8);
  dctx.stroke();

  const label = color==='green'?'🟢 초록불' : color==='red'?'🔴 빨간불' : '🔍 신호등';
  dctx.fillStyle = col;
  dctx.beginPath();
  dctx.roundRect(bx*sx, by*sy - 26, 110, 22, 4);
  dctx.fill();
  dctx.fillStyle = '#fff';
  dctx.font = 'bold 12px system-ui';
  dctx.fillText(`${label} ${Math.round(score*100)}%`, bx*sx + 6, by*sy - 9);
}

// ── HSL 색상 분석 ─────────────────────────────────────────
function analyzeRegion(ctx, x, y, w, h) {
  x = Math.max(0, Math.floor(x));
  y = Math.max(0, Math.floor(y));
  w = Math.min(Math.floor(w), ctx.canvas.width  - x);
  h = Math.min(Math.floor(h), ctx.canvas.height - y);
  if (w <= 0 || h <= 0) return 'unknown';

  const data = ctx.getImageData(x, y, w, h).data;
  let red=0, green=0, total=0;

  for (let i = 0; i < data.length; i += 4) {
    const r=data[i], g=data[i+1], b=data[i+2], a=data[i+3];
    if (a < 100) continue;
    total++;
    const mx  = Math.max(r, g, b);
    if (mx < 60) continue;
    const sat = (mx - Math.min(r,g,b)) / mx;
    if (sat < 0.3) continue;

    const nr=r/255, ng=g/255, nb=b/255;
    const nmx=Math.max(nr,ng,nb), delta=nmx-Math.min(nr,ng,nb);
    if (delta === 0) continue;
    let hue;
    if      (nmx===nr) hue = ((ng-nb)/delta) % 6;
    else if (nmx===ng) hue = (nb-nr)/delta + 2;
    else               hue = (nr-ng)/delta + 4;
    hue = hue * 60;
    if (hue < 0) hue += 360;

    if ((hue <= 20 || hue >= 340) && r > 100) red++;
    if (hue >= 85  && hue <= 155  && g > 100) green++;
  }

  if (total < 80) return 'unknown';
  const th = 0.02;
  if (red   > green * 2   && red   / total > th) return 'red';
  if (green > red  * 1.5  && green / total > th) return 'green';
  return 'unknown';
}

// ── 음성 ──────────────────────────────────────────────────
function speak(color) {
  if (!opts.voice || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const msg = color==='green' ? '초록불입니다. 건너세요.' : '빨간불입니다. 멈추세요.';
  const u   = new SpeechSynthesisUtterance(msg);
  u.lang = 'ko-KR'; u.rate = 0.9; u.volume = 1;
  const ko = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('ko'));
  if (ko) u.voice = ko;
  window.speechSynthesis.speak(u);
}

// ── 진동 ──────────────────────────────────────────────────
function vibrate(color) {
  if (!opts.vib || !navigator.vibrate) return;
  navigator.vibrate(
    color === 'green' ? [200,100,200] : [500,150,500,150,500]
  );
}

// 음성 목록 미리 로드
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  speechSynthesis.getVoices();
}
</script>
</body>
</html>
