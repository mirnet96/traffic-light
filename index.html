<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>ULTRA VISION AI - 고정밀 모드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <style>
        @keyframes pulse-green { 0%, 100% { box-shadow: inset 0 0 100px #22c55e; } 50% { box-shadow: inset 0 0 200px #22c55e; } }
        @keyframes pulse-red { 0%, 100% { box-shadow: inset 0 0 100px #ef4444; } 50% { box-shadow: inset 0 0 200px #ef4444; } }
        .active-g { animation: pulse-green 0.6s infinite; border: 35px solid #22c55e !important; }
        .active-r { animation: pulse-red 0.6s infinite; border: 35px solid #ef4444 !important; }
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        .h-safe { height: 100dvh; } 
    </style>
</head>
<body class="bg-black text-white overflow-hidden select-none">

<div id="app" class="relative h-safe flex flex-col">
    <div class="flex bg-slate-900 border-b border-white/10 p-4 pt-16 justify-between items-center z-50">
        <div id="status-badge" class="font-black text-xl text-slate-400">환경 분석 대기</div>
        <div class="flex items-center gap-3">
            <div id="ground-status" class="text-[10px] bg-slate-800 px-2 py-1 rounded-full text-slate-400 font-bold uppercase tracking-tighter">Ready</div>
            <button id="close-app-btn-top" class="bg-red-600/30 border border-red-500/50 text-red-500 w-9 h-9 rounded-full font-black flex items-center justify-center active:scale-90 transition">X</button>
        </div>
    </div>

    <div class="relative flex-1 bg-black overflow-hidden">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas" style="display:none;"></canvas>
        <div id="border-overlay" class="absolute inset-0 z-20 transition-all duration-300 pointer-events-none"></div>
    </div>

    <div id="logs" class="h-10 bg-black px-4 flex items-center font-mono text-[9px] text-slate-700 border-t border-white/5">
        <div id="log-content">Initializing High-Precision Engine...</div>
    </div>

    <div id="boot-screen" class="absolute inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-6 text-center">
        <div class="bg-slate-900 w-full max-w-sm p-8 rounded-[45px] border border-white/5 shadow-2xl flex flex-col items-center">
            <div class="w-20 h-20 rounded-full bg-red-600/10 flex items-center justify-center border-2 border-red-600/50 mb-6">
                <span class="text-5xl text-red-600 font-black">!</span>
            </div>
            <h1 class="text-2xl font-black mb-2 text-white italic">HIGH-PRECISION</h1>
            <p class="text-slate-500 text-xs mb-8 uppercase tracking-widest font-bold">Prototype V2.1 (Lite2)</p>
            
            <div class="text-slate-300 text-sm mb-10 space-y-3 font-medium leading-relaxed px-2 text-left bg-black/30 p-4 rounded-2xl border border-white/5">
                <p>⚠️ 본 앱은 <strong class="text-white font-bold text-base underline">연구 전용</strong>입니다.</p>
                <p>⚠️ 신호등 검출 실패 시 위험할 수 있으니</p>
                <p>⚠️ <strong class="text-red-500">지팡이와 주변 확인</strong>을 우선하세요.</p>
            </div>
            
            <div class="w-full space-y-4">
                <button id="start-btn" class="w-full py-8 bg-blue-600 hover:bg-blue-500 text-white rounded-[32px] font-black text-3xl shadow-xl transition active:scale-95">확인 및 가동</button>
                <button id="close-app-btn-bottom" class="w-full py-4 bg-transparent text-slate-500 font-bold text-sm">시스템 종료</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { ObjectDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

let detector, video, videoTrack, isRunning = false;
let lastConfirmed = 'unknown', lastGround = '일반도로';
let signalHistory = [];
let frameCount = 0;

const canvas = document.getElementById("output_canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const statusEl = document.getElementById('status-badge');
const groundEl = document.getElementById('ground-status');
const borderEl = document.getElementById('border-overlay');
const logEl = document.getElementById('log-content');
const bootScreen = document.getElementById('boot-screen');

function rgbToHsv(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    const d = max - min;
    let h, s = (max === 0 ? 0 : d / max), v = max;
    if (max === min) h = 0;
    else {
        switch (max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
    }
    return [h, s, v];
}

function analyzeGround(imageData) {
    const data = imageData.data;
    let yellow = 0, white = 0, total = 0;
    for (let i = 0; i < data.length; i += 40) {
        const r = data[i], g = data[i+1], b = data[i+2];
        const brightness = (r + g + b) / 3;
        total++;
        if (r > 140 && g > 120 && b < 100) yellow++; // 노란색 범위 소폭 완화
        else if (brightness > 185 && Math.abs(r-g) < 20 && Math.abs(g-b) < 20) white++;
    }
    const ratio = (n) => n / total;
    if (ratio(yellow) > 0.10) return "점자블록";
    if (ratio(white) > 0.15) return "횡단보도";
    return "일반도로";
}

function analyzeSignalHSV(imageData) {
    const data = imageData.data;
    let rVotes = 0, gVotes = 0;
    for (let i = 0; i < data.length; i += 4) {
        const [h, s, v] = rgbToHsv(data[i], data[i+1], data[i+2]);
        // 채도(S) 조건을 소폭 완화하여 흐린 날 인식률 향상
        if (s > 0.35 && v > 0.35) {
            if (h < 0.04 || h > 0.96) rVotes++;
            else if (h > 0.35 && h < 0.52) gVotes++; // 초록색 범위 확장
        }
    }
    logEl.textContent = `Votes - Red: ${rVotes}, Green: ${gVotes}`;
    if (rVotes > gVotes && rVotes > 5) return 'red';
    if (gVotes > rVotes && gVotes > 5) return 'green';
    return 'unknown';
}

async function predictLoop() {
    if (!detector || !isRunning) return;
    frameCount++;

    // 1. 신호등 객체 탐지
    const detections = await detector.detectForVideo(video, performance.now());
    let trafficLight = detections.detections.find(d => d.categories[0].categoryName === "traffic light");

    // 2. 바닥 및 영역 집중 분석 (5프레임당 1회)
    if (frameCount % 5 === 0) {
        canvas.width = 120; canvas.height = 90;
        // 바닥 탐지 (하단 25%)
        ctx.drawImage(video, 0, video.videoHeight * 0.75, video.videoWidth, video.videoHeight * 0.25, 0, 0, 120, 90);
        let currentGround = analyzeGround(ctx.getImageData(0, 0, 120, 90));
        
        if (currentGround !== lastGround) {
            lastGround = currentGround;
            groundEl.textContent = currentGround;
            if (currentGround !== "일반도로") {
                groundEl.className = "text-[10px] bg-blue-600 px-2 py-1 rounded-full text-white font-bold uppercase";
                applyZoom(1.8); // 줌을 더 강력하게
                speak(currentGround + " 확인");
            } else {
                groundEl.className = "text-[10px] bg-slate-800 px-2 py-1 rounded-full text-slate-400 font-bold uppercase";
                applyZoom(1.0);
            }
        }
    }

    // 3. 신호 판별
    if (trafficLight) {
        const box = trafficLight.boundingBox;
        canvas.width = 60; canvas.height = 60;
        ctx.drawImage(video, box.originX, box.originY, box.width, box.height, 0, 0, 60, 60);
        const color = analyzeSignalHSV(ctx.getImageData(0, 0, 60, 60));
        updateUI(color);
    } else {
        updateUI('unknown');
    }
    window.requestAnimationFrame(predictLoop);
}

function updateUI(color) {
    signalHistory.push(color);
    if (signalHistory.length > 5) signalHistory.shift();
    const counts = signalHistory.reduce((a, c) => (a[c] = (a[c] || 0) + 1, a), {});
    const final = Object.keys(counts).find(k => counts[k] >= 3 && k !== 'unknown') || 'unknown';

    if (final !== lastConfirmed) {
        lastConfirmed = final;
        if (final === 'green') {
            statusEl.textContent = "초록불 가세요";
            statusEl.className = "font-black text-2xl text-green-400";
            borderEl.className = "absolute inset-0 z-20 active-g";
            speak("초록불입니다");
        } else if (final === 'red') {
            statusEl.textContent = "빨간불 정지";
            statusEl.className = "font-black text-2xl text-red-400";
            borderEl.className = "absolute inset-0 z-20 active-r";
            speak("빨간불입니다");
        } else {
            statusEl.textContent = "신호 탐색 중";
            statusEl.className = "font-black text-2xl text-slate-500";
            borderEl.className = "absolute inset-0 z-20 pointer-events-none";
        }
    }
}

async function applyZoom(val) {
    if (videoTrack) {
        const caps = videoTrack.getCapabilities();
        if (caps.zoom) {
            try { await videoTrack.applyConstraints({ advanced: [{ zoom: val }] }); } catch(e) {}
        }
    }
}

function speak(t, rate = 1.3) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ko-KR'; s.rate = rate; 
    window.speechSynthesis.speak(s);
}

function terminateSystem() {
    isRunning = false;
    if (videoTrack) videoTrack.stop();
    bootScreen.style.display = 'flex';
    statusEl.textContent = "환경 분석 대기";
    borderEl.className = "absolute inset-0 z-20 pointer-events-none";
    speak("종료합니다", 1.1);
}

document.getElementById('start-btn').addEventListener('click', async () => {
    window.speechSynthesis.cancel();
    bootScreen.style.display = 'none';
    isRunning = true;
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", focusMode: "continuous" } 
        });
        video = document.getElementById("webcam");
        video.srcObject = stream;
        videoTrack = stream.getVideoTracks()[0];
    } catch (e) {
        alert("카메라를 시작할 수 없습니다.");
        return;
    }

    if (!detector) {
        statusEl.textContent = "LITE2 모델 로드 중...";
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
        detector = await ObjectDetector.createFromOptions(vision, {
            baseOptions: {
                // 고정밀 Lite2 모델 적용
                modelAssetPath: `https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite2/float16/1/efficientdet_lite2.tflite`,
                delegate: "GPU"
            },
            scoreThreshold: 0.35,
            runningMode: "VIDEO"
        });
    }
    video.addEventListener("loadeddata", predictLoop);
    speak("정밀 탐지 시작");
});

document.getElementById('close-app-btn-top').addEventListener('click', terminateSystem);
document.getElementById('close-app-btn-bottom').addEventListener('click', terminateSystem);

window.addEventListener('load', () => {
    speak("주의하세요. 고정밀 모델을 사용하는 개발용 버전입니다. 지팡이와 함께 사용하세요.", 0.95);
});
</script>
</body>
</html>
