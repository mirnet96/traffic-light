<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>ULTRA VISION AI - 통합 보조 모드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <style>
        @keyframes pulse-green { 0%, 100% { box-shadow: inset 0 0 80px #22c55e; } 50% { box-shadow: inset 0 0 180px #22c55e; } }
        @keyframes pulse-red { 0%, 100% { box-shadow: inset 0 0 80px #ef4444; } 50% { box-shadow: inset 0 0 180px #ef4444; } }
        .active-g { animation: pulse-green 0.6s infinite; border: 25px solid #22c55e !important; }
        .active-r { animation: pulse-red 0.6s infinite; border: 25px solid #ef4444 !important; }
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        #guide-overlay { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); width: 80%; height: 2px; background: rgba(255,255,255,0.3); z-index: 30; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden select-none">

<div id="app" class="relative h-screen flex flex-col">
    <div class="flex bg-slate-900 border-b border-white/10 p-4 justify-between items-center z-50">
        <div id="status-badge" class="font-black text-xl text-blue-400">환경 분석 중...</div>
        <div id="ground-status" class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400">바닥 감지 대기</div>
    </div>

    <div class="relative flex-1 bg-black overflow-hidden">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output_canvas" style="display:none;"></canvas>
        <div id="guide-overlay"></div>
        <div id="border-overlay" class="absolute inset-0 z-20 transition-all duration-300 pointer-events-none"></div>
    </div>

    <div id="logs" class="h-14 bg-slate-950 p-2 font-mono text-[10px] text-slate-500 border-t border-white/5 overflow-hidden">
        <div id="log-content">점자블록 및 횡단보도 패턴 추적 중...</div>
    </div>

    <div id="boot-screen" class="absolute inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-5xl font-black mb-4 text-blue-500">ULTRA VISION</h1>
        <p class="text-slate-400 mb-12">신호등 · 점자블록 · 횡단보도 통합 안내</p>
        <button id="start-btn" class="w-full py-10 bg-blue-600 text-white rounded-[40px] font-black text-4xl shadow-2xl">가동 시작</button>
    </div>
</div>

<script type="module">
import { ObjectDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

let detector, video, videoTrack, audioCtx;
let lastConfirmed = 'unknown', lastGround = '';
let signalHistory = [], groundHistory = [];

const canvas = document.getElementById("output_canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const statusEl = document.getElementById('status-badge');
const groundEl = document.getElementById('ground-status');
const borderEl = document.getElementById('border-overlay');

// --- [전자동 바닥 분석 로직] ---
function analyzeGround(imageData) {
    const data = imageData.data;
    let yellowPixels = 0, whitePixels = 0;
    const total = data.length / 4;

    for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        
        // 1. 점자블록 감지 (노란색: R, G가 높고 B가 낮음)
        if (r > 150 && g > 130 && b < 100) yellowPixels++;
        
        // 2. 횡단보도 흰줄 감지 (고휘도: R, G, B 모두 높음)
        if (r > 200 && g > 200 && b > 200) whitePixels++;
    }

    const yellowRate = yellowPixels / total;
    const whiteRate = whitePixels / total;

    if (yellowRate > 0.15) return "점자블록";
    if (whiteRate > 0.20) return "횡단보도";
    return "일반도로";
}

// --- [신호등 HSV 분석] ---
function analyzeSignal(imageData) {
    const data = imageData.data;
    let rVotes = 0, gVotes = 0;
    for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i+1], b = data[i+2];
        let max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h = 0, d = max - min;
        if (max !== min) {
            if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
            else if (max === g) h = (b - r) / d + 2;
            else h = (r - g) / d + 4;
            h /= 6;
        }
        if (max > 160) {
            if (h < 0.08 || h > 0.92) rVotes++;
            else if (h > 0.28 && h < 0.45) gVotes++;
        }
    }
    return rVotes > gVotes ? 'red' : (gVotes > rVotes ? 'green' : 'unknown');
}

async function predictLoop() {
    if (!detector) return;

    // 1. 신호등 객체 탐지
    const detections = await detector.detectForVideo(video, performance.now());
    const trafficLight = detections.detections.find(d => d.categories[0].categoryName === "traffic light");

    // 2. 바닥 영역 분석 (화면 하단 30% 영역 크롭)
    canvas.width = 160; canvas.height = 120;
    ctx.drawImage(video, 0, video.videoHeight * 0.7, video.videoWidth, video.videoHeight * 0.3, 0, 0, 160, 120);
    const groundResult = analyzeGround(ctx.getImageData(0, 0, 160, 120));
    
    // 바닥 상태 안내 (변화 시에만)
    if (groundResult !== lastGround) {
        lastGround = groundResult;
        groundEl.textContent = groundResult;
        if (groundResult !== "일반도로") speak(groundResult + " 감지");
    }

    // 3. 신호등 색상 분석
    if (trafficLight) {
        const box = trafficLight.boundingBox;
        ctx.drawImage(video, box.originX, box.originY, box.width, box.height, 0, 0, 100, 100);
        const color = analyzeSignal(ctx.getImageData(0, 0, 100, 100));
        updateUI(color);
        // 원거리 발견 시 자동 줌
        if (trafficLight.categories[0].score > 0.3) applyZoom(2.0);
    } else {
        updateUI('unknown');
        applyZoom(1.0);
    }

    setTimeout(() => { window.requestAnimationFrame(predictLoop); }, 100);
}

function updateUI(color) {
    signalHistory.push(color);
    if (signalHistory.length > 10) signalHistory.shift();
    const counts = signalHistory.reduce((a, c) => (a[c] = (a[c] || 0) + 1, a), {});
    const final = Object.keys(counts).find(k => counts[k] >= 7 && k !== 'unknown') || 'unknown';

    if (final !== lastConfirmed) {
        lastConfirmed = final;
        if (final === 'green') {
            statusEl.textContent = "초록불 (가세요)";
            borderEl.className = "absolute inset-0 z-20 active-g";
            speak("초록불입니다. 건너가세요.");
        } else if (final === 'red') {
            statusEl.textContent = "빨간불 (정지)";
            borderEl.className = "absolute inset-0 z-20 active-r";
            speak("빨간불입니다. 잠시 멈추세요.");
        }
    }
}

async function applyZoom(val) {
    if (videoTrack) {
        const caps = videoTrack.getCapabilities();
        if (caps.zoom) {
            await videoTrack.applyConstraints({ advanced: [{ zoom: val }] });
        }
    }
}

function speak(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ko-KR'; s.rate = 1.1;
    window.speechSynthesis.speak(s);
}

document.getElementById('start-btn').addEventListener('click', async () => {
    document.getElementById('boot-screen').style.display = 'none';
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video = document.getElementById("webcam");
    video.srcObject = stream;
    videoTrack = stream.getVideoTracks()[0];

    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    detector = await ObjectDetector.createFromOptions(vision, {
        baseOptions: { 
            modelAssetPath: `https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite`, 
            delegate: "GPU" 
        },
        scoreThreshold: 0.3,
        runningMode: "VIDEO"
    });

    video.addEventListener("loadeddata", predictLoop);
    speak("통합 안내 시스템 시작");
});
</script>
</body>
</html>
