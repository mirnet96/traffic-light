<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>ULTRA VISION AI - 하이브리드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_NAVER_CLIENT_ID"></script>
    <style>
        .h-safe { height: 100dvh; }
        .tab-content { display: none; }
        .tab-content.active { display: flex; }
        .active-g { border: 20px solid #22c55e !important; }
        .active-r { border: 20px solid #ef4444 !important; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden select-none">

<div id="app" class="relative h-safe flex flex-col">
    <div class="flex bg-slate-900 pt-12 border-b border-white/10 z-50">
        <button onclick="switchTab('vision')" id="tab-v-btn" class="flex-1 py-4 font-black text-blue-400 border-b-4 border-blue-500">AI 비전</button>
        <button onclick="switchTab('data')" id="tab-d-btn" class="flex-1 py-4 font-black text-slate-500">API 데이터</button>
    </div>

    <div id="vision-tab" class="tab-content active flex-1 flex-col relative overflow-hidden">
        <div class="absolute top-4 left-4 z-30 bg-black/50 p-2 rounded text-[10px] font-mono">
            STATUS: <span id="status-badge">STANDBY</span> | <span id="ground-status">READY</span>
        </div>
        <video id="webcam" class="w-full h-full object-cover" autoplay playsinline muted></video>
        <div id="border-overlay" class="absolute inset-0 z-20 pointer-events-none transition-all duration-300"></div>
    </div>

    <div id="data-tab" class="tab-content flex-1 flex-col p-6 bg-slate-950 overflow-y-auto">
        <div class="bg-slate-900 rounded-3xl p-6 border border-white/5 mb-6">
            <h2 class="text-slate-400 text-xs font-bold mb-1 uppercase tracking-widest">Current Location</h2>
            <div id="location-text" class="text-xl font-black text-white">위치 정보를 불러오는 중...</div>
            <div id="map" class="w-full h-40 bg-slate-800 mt-4 rounded-2xl overflow-hidden border border-white/10"></div>
        </div>

        <div id="api-result" class="space-y-4">
            <div class="bg-slate-900 rounded-[32px] p-8 border-l-8 border-red-500 shadow-2xl">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <div class="text-slate-500 text-xs font-bold uppercase">Nearest Intersection</div>
                        <div id="cross-name" class="text-2xl font-black">종로3가 교차로</div>
                    </div>
                    <div id="signal-timer" class="text-5xl font-black text-red-500">12</div>
                </div>
                <div id="api-status-text" class="text-4xl font-black text-red-500">보행 금지</div>
                <p class="text-slate-500 text-sm mt-4 italic">※ 서울시 교통정보 API 실시간 데이터</p>
            </div>
        </div>
        
        <button onclick="fetchSignalData()" class="mt-auto py-6 bg-blue-600 rounded-2xl font-black text-xl active:scale-95 transition">데이터 강제 새로고침</button>
    </div>

    <div class="h-16 bg-slate-900 border-t border-white/10 flex items-center px-6 justify-between">
        <div id="log-content" class="text-[9px] font-mono text-slate-500 uppercase">System Ready</div>
        <button id="close-app" class="text-red-500 font-black px-4 py-2 border border-red-500/30 rounded-xl">종료</button>
    </div>

    <div id="boot-screen" class="absolute inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
        <div class="bg-slate-900 w-full max-w-sm p-10 rounded-[50px] text-center border border-white/5">
            <div class="text-5xl mb-6">🛰️</div>
            <h1 class="text-3xl font-black mb-4">HYBRID VISION</h1>
            <p class="text-slate-400 text-sm mb-10 leading-relaxed">비전 분석과 API 데이터를 결합하여<br>가장 정확한 신호를 안내합니다.</p>
            <button id="start-btn" class="w-full py-8 bg-blue-600 rounded-[30px] font-black text-2xl shadow-xl active:scale-95">시작하기</button>
        </div>
    </div>
</div>

<script type="module">
    // --- 탭 전환 로직 ---
    window.switchTab = (type) => {
        const vTab = document.getElementById('vision-tab');
        const dTab = document.getElementById('data-tab');
        const vBtn = document.getElementById('tab-v-btn');
        const dBtn = document.getElementById('tab-d-btn');

        if(type === 'vision') {
            vTab.classList.add('active'); dTab.classList.remove('active');
            vBtn.className = "flex-1 py-4 font-black text-blue-400 border-b-4 border-blue-500";
            dBtn.className = "flex-1 py-4 font-black text-slate-500";
        } else {
            vTab.classList.remove('active'); dTab.classList.add('active');
            dBtn.className = "flex-1 py-4 font-black text-blue-400 border-b-4 border-blue-500";
            vBtn.className = "flex-1 py-4 font-black text-slate-500";
            initMap(); // 탭 전환 시 지도 로드
        }
    };

    // --- API 연동 부분 (서울시 T-Data) ---
    const API_KEY = "7c76f496-b1f7-459f-85f1-ec9359276fce";
    
    async function fetchSignalData() {
        const log = document.getElementById('log-content');
        log.textContent = "API FETCHING...";
        
        try {
            // 실제 호출 시 CORS 정책에 따라 프록시 서버가 필요할 수 있습니다.
            // 아래는 서울시 신호잔여시간 API 호출 예시 구조입니다.
            const url = `https://t-data.seoul.go.kr/apigw/rest/v1/getSignalPhaseInfo?apiKey=${API_KEY}&type=json`;
            
            // 테스트를 위한 더미 데이터 처리 (실제 연동 시 fetch 사용)
            setTimeout(() => {
                document.getElementById('api-status-text').textContent = "보행 가능";
                document.getElementById('api-status-text').className = "text-4xl font-black text-green-500";
                document.getElementById('signal-timer').textContent = "25";
                document.getElementById('signal-timer').className = "text-5xl font-black text-green-500";
                log.textContent = "API UPDATED SUCCESSFULLY";
                speak("데이터 확인 결과, 초록불입니다. 잔여 시간 25초.");
            }, 1000);

        } catch (e) {
            log.textContent = "API ERROR";
        }
    }

    // --- 네이버 지도 초기화 ---
    function initMap() {
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            document.getElementById('location-text').textContent = `N ${lat.toFixed(4)} / E ${lng.toFixed(4)}`;
            
            const mapOptions = {
                center: new naver.maps.LatLng(lat, lng),
                zoom: 17,
                zoomControl: false,
                mapDataControl: false
            };
            const map = new naver.maps.Map('map', mapOptions);
            new naver.maps.Marker({ position: new naver.maps.LatLng(lat, lng), map: map });
        });
    }

    // --- 음성 안내 ---
    function speak(t) {
        window.speechSynthesis.cancel();
        const s = new SpeechSynthesisUtterance(t);
        s.lang = 'ko-KR'; s.rate = 1.3;
        window.speechSynthesis.speak(s);
    }

    // 시작 버튼 및 종료 버튼 이벤트는 기존과 동일하게 구성 (생략)
    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('boot-screen').style.display = 'none';
        speak("하이브리드 시스템 가동");
        // 비전 처리 로직 실행...
    });
</script>
</body>
</html>
