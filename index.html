<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>ULTRA VISION AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=xa51z84fnk&submodules=geocoder"></script>
    <style>
        .h-safe { height: 100dvh; }
        .tab-content { display: none; height: calc(100% - 140px); position: relative; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .tab-content.active { display: block; }
        
        /* 비전 레이어 설정 */
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5; }
        #webcam-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* 상태 알림 오버레이 (신호 감지 시 테두리 색상 변경) */
        #border-overlay { position: absolute; inset: 0; z-index: 12; pointer-events: none; transition: all 0.3s; border: 0px solid transparent; }
        .active-r { border: 20px solid rgba(239, 68, 68, 0.4) !important; box-shadow: inset 0 0 50px rgba(239, 68, 68, 0.5); }
        .active-g { border: 20px solid rgba(34, 197, 94, 0.4) !important; box-shadow: inset 0 0 50px rgba(34, 197, 94, 0.5); }

        /* 지도 및 스캐너 */
        #map { width: 100%; height: 280px; background-color: #111; border-radius: 1.5rem; margin-top: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: rgba(59, 130, 246, 0.5); z-index: 15; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-[#050505] text-white overflow-hidden select-none">
<div id="app" class="relative h-safe flex flex-col">
    <nav class="flex bg-[#111] pt-12 border-b border-white/10 z-50">
        <button id="tab-v-btn" class="flex-1 py-4 font-black text-blue-400 border-b-4 border-blue-500">VISION AI</button>
        <button id="tab-d-btn" class="flex-1 py-4 font-black text-zinc-500">V2X DATA</button>
    </nav>

    <div id="vision-tab" class="tab-content active" style="height: 100%;">
        <div id="border-overlay"></div> <div class="scanner-line"></div>
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="webcam-canvas"></canvas>
        
        <div id="debug-panel" class="absolute bottom-6 right-4 z-30 bg-[#111]/90 p-4 rounded-3xl border border-white/10 w-48 shadow-2xl space-y-3 opacity-0 transition-opacity">
            <h3 class="text-[10px] font-bold text-zinc-500 text-center uppercase tracking-tighter">AI ROI ANALYSIS</h3>
            
            <div class="aspect-[1/2] bg-black rounded-xl overflow-hidden border border-white/20">
                <canvas id="roi-canvas" class="w-full h-full object-cover"></canvas>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between text-[9px] font-bold text-red-400">
                    <span>RED SCORE</span>
                    <span id="red-val">0%</span>
                </div>
                <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
                    <div id="red-bar" class="h-full bg-red-500 transition-all duration-200" style="width: 0%"></div>
                </div>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between text-[9px] font-bold text-green-400">
                    <span>GREEN SCORE</span>
                    <span id="green-val">0%</span>
                </div>
                <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
                    <div id="green-bar" class="h-full bg-green-500 transition-all duration-200" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="data-tab" class="tab-content p-6 bg-[#0a0a0a] space-y-6">
        <div class="bg-zinc-900 rounded-3xl p-5 border border-white/5 shadow-xl">
            <div id="location-text" class="text-[10px] font-mono text-blue-400 italic">GPS 수신 대기 중...</div>
            <div id="map"></div>
        </div>

        <div id="api-card" class="bg-zinc-900 rounded-[40px] p-8 border-l-[12px] border-zinc-700 shadow-2xl transition-all">
            <h1 id="cross-name" class="text-2xl font-black italic tracking-tighter text-zinc-300">주변 탐색 중...</h1>
            <div class="py-8">
                <div id="api-status-text" class="text-7xl font-black text-zinc-800 text-center tracking-tighter">READY</div>
            </div>
            <button id="refresh-api" class="w-full py-4 bg-white/5 rounded-2xl text-[10px] font-bold uppercase tracking-widest text-zinc-500 active:bg-white/10">Manual Refresh</button>
        </div>
        
        <div class="h-24"></div> </div>

    <div id="boot-screen" class="absolute inset-0 bg-[#050505] z-[100] flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="bg-zinc-900 w-full max-w-sm p-10 rounded-[50px] text-center shadow-2xl border border-white/5">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <span class="text-4xl">🚶</span>
            </div>
            <h1 class="text-3xl font-black mb-2 italic tracking-tighter uppercase">Ultra Vision</h1>
            <p class="text-zinc-500 text-xs font-bold mb-10 tracking-widest uppercase opacity-60">Pedestrian Safety System</p>
            <button id="start-btn" class="w-full py-6 bg-blue-600 rounded-[30px] font-black text-xl active:scale-95 transition-transform shadow-xl shadow-blue-600/30">SYSTEM START</button>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
