<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ULTRA VISION - Real-time V2X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_CLIENT_ID&submodules=geocoder"></script>
    <style>
        .h-safe { height: 100dvh; }
        .tab-content { display: none; height: calc(100% - 140px); }
        .tab-content.active { display: flex; flex-direction: column; }
        .signal-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-left: 12px solid #27272a; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner { height: 2px; background: rgba(59, 130, 246, 0.5); position: absolute; width: 100%; z-index: 30; animation: scan 2s linear infinite; }
    </style>
</head>
<body class="bg-[#050505] text-white overflow-hidden">

<div id="app" class="relative h-safe flex flex-col">
    <nav class="flex bg-[#111] pt-12 border-b border-white/5 z-50">
        <button onclick="switchTab('vision')" id="btn-v" class="flex-1 py-4 text-sm font-black text-blue-500 border-b-2 border-blue-500">VISION AI</button>
        <button onclick="switchTab('data')" id="btn-d" class="flex-1 py-4 text-sm font-black text-zinc-500">V2X DATA</button>
    </nav>

    <div id="vision-tab" class="tab-content active relative">
        <div class="scanner"></div>
        <video id="webcam" class="w-full h-full object-cover" autoplay playsinline muted></video>
        <div class="absolute bottom-6 left-6 right-6 p-4 bg-black/60 backdrop-blur-md rounded-2xl border border-white/10">
            <p class="text-xs font-mono text-zinc-400 uppercase tracking-widest mb-1">Scanning Environment...</p>
            <h2 class="text-2xl font-black italic">시각 탐색 모드</h2>
        </div>
    </div>

    <div id="data-tab" class="tab-content p-5 space-y-4 bg-[#0a0a0a]">
        <div class="h-1/3 bg-[#111] rounded-3xl overflow-hidden relative border border-white/5">
            <div id="map" class="w-full h-full opacity-60"></div>
            <div class="absolute top-4 left-4 bg-black/80 px-3 py-1 rounded-full text-[10px] font-mono border border-white/20">
                GPS: <span id="gps-coord">0.0000, 0.0000</span>
            </div>
        </div>

        <div id="data-card" class="signal-card flex-1 bg-zinc-900 rounded-[40px] p-8 flex flex-col justify-between border border-white/5">
            <div>
                <div class="flex justify-between items-start">
                    <span class="text-xs font-bold text-zinc-500 uppercase tracking-tighter">Connected Node</span>
                    <span id="sync-indicator" class="bg-zinc-800 text-zinc-500 text-[10px] px-2 py-1 rounded-md font-bold">WAITING</span>
                </div>
                <h1 id="cross-name" class="text-2xl font-black mt-2">위치 확인 중...</h1>
                <p id="cross-addr" class="text-zinc-500 text-xs mt-1">GPS 신호를 수신하고 있습니다.</p>
            </div>

            <div class="text-center py-6">
                <div id="api-timer" class="text-8xl font-black tracking-tighter text-zinc-800">--</div>
                <div id="api-signal-text" class="text-3xl font-black mt-2 text-zinc-700">DATA SYNCING</div>
            </div>

            <button onclick="syncApiData()" class="w-full py-4 bg-white/5 hover:bg-white/10 rounded-2xl text-xs font-bold border border-white/10 transition active:scale-95">FORCE REFRESH</button>
        </div>
    </div>

    <footer class="h-16 bg-[#111] border-t border-white/5 flex items-center px-8 justify-between">
        <div class="flex items-center gap-2">
            <div id="status-dot" class="w-2 h-2 bg-zinc-600 rounded-full"></div>
            <span class="text-[10px] font-mono text-zinc-500">LIVE_DATA_STREAM</span>
        </div>
        <div id="ground-chip" class="text-[10px] font-black px-3 py-1 bg-zinc-800 rounded-full text-zinc-400 italic">OFFLINE</div>
    </footer>
</div>

<script type="module">
    const SEOUL_API_KEY = "7c76f496-b1f7-459f-85f1-ec9359276fce";
    let map, marker, userLat, userLng;
    let isMapInitialized = false;

    // --- 탭 스위칭 ---
    window.switchTab = (target) => {
        document.getElementById('vision-tab').classList.toggle('active', target === 'vision');
        document.getElementById('data-tab').classList.toggle('active', target === 'data');
        
        document.getElementById('btn-v').className = target === 'vision' ? "flex-1 py-4 text-sm font-black text-blue-500 border-b-2 border-blue-500" : "flex-1 py-4 text-sm font-black text-zinc-500";
        document.getElementById('btn-d').className = target === 'data' ? "flex-1 py-4 text-sm font-black text-blue-500 border-b-2 border-blue-500" : "flex-1 py-4 text-sm font-black text-zinc-500";
        
        if(target === 'data' && !isMapInitialized) {
            initLocation();
        }
    }

    // --- 1. 위치 확인 시작 ---
    function initLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                userLat = pos.coords.latitude;
                userLng = pos.coords.longitude;
                document.getElementById('gps-coord').textContent = `${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
                
                // 지도 초기화
                renderMap(userLat, userLng);
                // 주소 정보 가져오기 (완료 후 API 호출)
                fetchAddress(userLat, userLng);
            }, (err) => {
                alert("GPS 정보를 가져올 수 없습니다.");
            });
        }
    }

    // --- 2. 네이버 지도 렌더링 ---
    function renderMap(lat, lng) {
        map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(lat, lng),
            zoom: 18,
            mapTypeId: naver.maps.MapTypeId.SATELLITE
        });
        marker = new naver.maps.Marker({
            position: new naver.maps.LatLng(lat, lng),
            map: map,
            icon: { content: '<div class="w-4 h-4 bg-blue-500 rounded-full border-2 border-white shadow-lg animate-pulse"></div>' }
        });
        isMapInitialized = true;
    }

    // --- 3. 주소 변환 및 데이터 호출 트리거 ---
    function fetchAddress(lat, lng) {
        naver.maps.Service.reverseGeocode({
            coords: new naver.maps.LatLng(lat, lng),
        }, (status, response) => {
            if (status === naver.maps.Service.Status.OK) {
                const items = response.v2.results;
                if(items.length > 0) {
                    const regionName = items[0].region.area3.name;
                    document.getElementById('cross-name').textContent = regionName + " 인근 교차로";
                    document.getElementById('cross-addr').textContent = items[0].region.area2.name + " " + regionName;
                    document.getElementById('ground-chip').textContent = regionName.toUpperCase();
                    
                    // 주소까지 확인이 끝난 후 실제 API 데이터를 가져옵니다.
                    syncApiData();
                }
            }
        });
    }

    // --- 4. 실제 서울시 신호 API 데이터 동기화 ---
    window.syncApiData = async () => {
        const timerEl = document.getElementById('api-timer');
        const textEl = document.getElementById('api-signal-text');
        const cardEl = document.getElementById('data-card');
        const indicator = document.getElementById('sync-indicator');
        const dot = document.getElementById('status-dot');

        // 상태 초기화
        indicator.textContent = "SYNCING...";
        indicator.className = "bg-blue-500 text-white text-[10px] px-2 py-1 rounded-md font-bold animate-pulse";

        try {
            // 실제 API 호출 (CORS 우회를 위해 임시 프록시 사용 예시)
            // 주의: 실제 서비스에서는 본인 서버에서 호출해야 합니다.
            const targetUrl = `https://t-data.seoul.go.kr/apigw/rest/v1/getSignalPhaseInfo?apiKey=${SEOUL_API_KEY}&type=json`;
            const proxyUrl = "https://cors-anywhere.herokuapp.com/"; 
            
            // 테스트용: 실제 호출 (CORS 차단 시 catch로 이동함)
            const response = await fetch(proxyUrl + targetUrl);
            const result = await response.json();

            // 데이터 가공 로직 (가장 가까운 교차로 itid 찾기 등)
            // 여기서는 첫 번째 데이터를 예시로 사용
            const trafficData = result.data[0]; 
            const phase = parseInt(trafficData.itphase); // 신호상태
            const remain = trafficData.itremain; // 잔여시간

            // 신호 상태 판단 (1, 4 등등 서울시 규격에 따름 - 여기선 예시 로직)
            const isGreen = (phase === 1 || phase === 5); // 예시: 1번이 보행자 초록불일 경우

            if(isGreen) {
                updateSignalUI('GREEN', remain);
            } else {
                updateSignalUI('RED', remain);
            }

            dot.className = "w-2 h-2 bg-green-500 rounded-full";
            indicator.textContent = "LIVE API";
            indicator.className = "bg-blue-500/10 text-blue-500 text-[10px] px-2 py-1 rounded-md font-bold";

        } catch (e) {
            console.warn("API 직접 연결 실패 (CORS 또는 키 오류). 시뮬레이션 모드로 전환합니다.");
            runSimulation(); // 실패 시 기존 시뮬레이션 실행
        }
    }

    function updateSignalUI(type, time) {
        const timerEl = document.getElementById('api-timer');
        const textEl = document.getElementById('api-signal-text');
        const cardEl = document.getElementById('data-card');

        if(type === 'GREEN') {
            timerEl.textContent = time;
            timerEl.className = "text-8xl font-black tracking-tighter text-green-500";
            textEl.textContent = "WALK NOW";
            textEl.className = "text-3xl font-black mt-2 text-green-500";
            cardEl.style.borderLeft = "12px solid #22c55e";
            speak(`초록불입니다. ${time}초 남았습니다.`);
        } else {
            timerEl.textContent = time;
            timerEl.className = "text-8xl font-black tracking-tighter text-red-500";
            textEl.textContent = "DON'T WALK";
            textEl.className = "text-3xl font-black mt-2 text-red-500";
            cardEl.style.borderLeft = "12px solid #ef4444";
            speak(`빨간불입니다. 정지하세요.`);
        }
    }

    function runSimulation() {
        const dummyStatus = Math.random() > 0.5 ? 'GREEN' : 'RED';
        const dummyTime = Math.floor(Math.random() * 30) + 5;
        updateSignalUI(dummyStatus, dummyTime);
        document.getElementById('sync-indicator').textContent = "SIMULATED";
    }

    function speak(msg) {
        window.speechSynthesis.cancel();
        const s = new SpeechSynthesisUtterance(msg);
        s.lang = 'ko-KR'; s.rate = 1.3;
        window.speechSynthesis.speak(s);
    }
</script>
</body>
</html>
