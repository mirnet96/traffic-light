<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>신호등 알리미 Pro - 강화형</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
    <style>
        @keyframes pulse-green { 0%, 100% { box-shadow: inset 0 0 50px #22c55e; } 50% { box-shadow: inset 0 0 150px #22c55e; } }
        @keyframes pulse-red { 0%, 100% { box-shadow: inset 0 0 50px #ef4444; } 50% { box-shadow: inset 0 0 150px #ef4444; } }
        .active-g { animation: pulse-green 0.8s infinite; border: 25px solid #22c55e !important; }
        .active-r { animation: pulse-red 0.8s infinite; border: 25px solid #ef4444 !important; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden select-none">

<div id="app" class="relative h-screen flex flex-col">
    <div class="flex bg-slate-900 border-b border-white/10 p-4 justify-between items-center z-50">
        <div id="status-badge" class="font-black text-xl text-blue-400 italic">SCANNING...</div>
        <div class="flex gap-2">
            <div id="night-mode-badge" class="bg-indigo-900 px-2 py-1 rounded text-[10px] hidden">야간 최적화</div>
            <div id="zoom-badge" class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold">1.0x</div>
        </div>
    </div>

    <div class="relative flex-1 bg-black overflow-hidden">
        <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
        <canvas id="canvas" class="absolute inset-0 w-full h-full pointer-events-none opacity-50"></canvas>
        <div id="border-overlay" class="absolute inset-0 pointer-events-none z-20 transition-all"></div>
        
        <div class="absolute top-[10%] left-0 w-full h-[40%] border-y border-dashed border-white/20 pointer-events-none">
            <span class="absolute top-2 left-2 text-[8px] text-white/30 font-mono">PRIMARY DETECTION ZONE</span>
        </div>
    </div>

    <div class="h-24 bg-slate-950 border-t border-white/10 p-2 overflow-y-auto font-mono text-[9px] text-slate-500" id="logs">
        <div>[System] 안정화 대기 중...</div>
    </div>

    <div id="boot-layer" class="absolute inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-8 text-center">
        <h1 class="text-4xl font-black mb-10 tracking-tighter">AI <span class="text-blue-500 italic text-5xl">TRAFFIC</span></h1>
        <button onclick="startApp()" class="w-full py-8 bg-blue-600 text-white rounded-[40px] font-black text-3xl shadow-[0_0_50px_rgba(37,99,235,0.4)] active:scale-95 transition-all">
            시작하기
        </button>
        <p class="mt-8 text-slate-500 text-xs leading-relaxed">복잡한 배경 및 야간 환경<br>인식률 강화 엔진 v3.0</p>
    </div>
</div>

<script>
let net = null, stream = null, isReady = false;
let zoomLevel = 1.0, zoomTimer = null;

// 시계열 분석을 위한 변수 (오인식 방지)
let signalHistory = []; // 최근 5번의 결과 저장
let lastAnnouncedSignal = 'unknown';

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const statusEl = document.getElementById('status-badge');
const borderEl = document.getElementById('border-overlay');

function addLog(m) {
    const d = new Date().toLocaleTimeString();
    document.getElementById('logs').innerHTML = `<div>[${d}] ${m}</div>` + document.getElementById('logs').innerHTML;
}

function announce(t) {
    window.speechSynthesis.cancel();
    const s = new SpeechSynthesisUtterance(t);
    s.lang = 'ko-KR';
    window.speechSynthesis.speak(s);
}

function triggerVibe(type) {
    if (!navigator.vibrate) return;
    if (type === 'green') navigator.vibrate([500, 100, 500, 100, 500]);
    else if (type === 'red') navigator.vibrate(200);
}

// 1. 카메라 야간 최적화 (노출 조절 시도)
async function setupCamera() {
    stream = await navigator.mediaDevices.getUserMedia({
        video: { 
            facingMode: 'environment',
            // 일부 안드로이드 기기에서 노출 조절 지원
            exposureMode: 'continuous',
            focusMode: 'continuous'
        }
    });
    video.srcObject = stream;
    
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities();
    
    // 야간 대응: 노출이 너무 높으면 낮추어 빛 번짐 억제
    if (caps.exposureCompensation) {
        await track.applyConstraints({ advanced: [{ exposureCompensation: -1.0 }] });
        document.getElementById('night-mode-badge').classList.remove('hidden');
        addLog("야간 대비 노출 보정 완료");
    }
}

async function startApp() {
    document.getElementById('boot-layer').style.display = 'none';
    try {
        await setupCamera();
        statusEl.textContent = "LOADING AI...";
        net = await cocoSsd.load();
        isReady = true;
        statusEl.textContent = "ACTIVE";
        announce("분석 엔진이 활성화되었습니다. 신호등을 정면으로 비춰주세요.");
        detectFrame();
    } catch (e) {
        alert("권한 오류: " + e.message);
    }
}

// 2. 핵심 분석 루프 (연속 프레임 분석 포함)
async function detectFrame() {
    if (!isReady) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const preds = await net.detect(video);
    
    // 분석 영역 제한 (화면 중앙 상단 10%~50% 영역에 있는 것만 우선)
    const trafficLight = preds.find(p => {
        const centerRY = (p.bbox[1] + p.bbox[3]/2) / canvas.height;
        return p.class === 'traffic light' && p.score > 0.35 && centerRY > 0.1 && centerRY < 0.6;
    });

    // 3. 자동 줌 탐색 (간판이 많을 때 작게 보이는 신호등 포착용)
    if (!trafficLight) {
        if (!zoomTimer) {
            zoomTimer = setInterval(() => {
                if (zoomLevel < 3.0) {
                    zoomLevel += 0.5;
                    updateZoom(zoomLevel);
                    announce("신호를 찾는 중입니다. 기기를 조금 더 높여보세요.");
                } else {
                    zoomLevel = 1.0;
                    updateZoom(1.0);
                }
            }, 5000);
        }
    } else {
        if (zoomTimer) { clearInterval(zoomTimer); zoomTimer = null; }
    }

    if (trafficLight) {
        const [x, y, w, h] = trafficLight.bbox;
        ctx.drawImage(video, x, y, w, h, 0, 0, 100, 100);
        const color = analyzeColorRatios(ctx.getImageData(0, 0, 100, 100).data);
        
        // 시계열 검증: 최근 5번의 결과 중 3번 이상 일치할 때만 확정
        signalHistory.push(color);
        if (signalHistory.length > 5) signalHistory.shift();
        
        const counts = signalHistory.reduce((a, c) => (a[c] = (a[c] || 0) + 1, a), {});
        const verifiedColor = Object.keys(counts).find(k => counts[k] >= 3 && k !== 'unknown') || 'unknown';
        
        processFinalResult(verifiedColor);
    } else {
        processFinalResult('unknown');
    }

    requestAnimationFrame(detectFrame);
}

// 4. 빛 번짐 대응 색상 분석 (임계값 강화)
function analyzeColorRatios(data) {
    let r = 0, g = 0;
    const total = data.length / 4;
    for (let i = 0; i < data.length; i += 4) {
        // 빛 번짐을 막기 위해 단순 RGB 대신 대비(Contrast) 확인
        const br = data[i], bg = data[i+1], bb = data[i+2];
        // 빨간색: 초록/파랑 대비 2배 이상 밝을 때만 인정 (간판 노이즈 제거)
        if (br > 160 && br > bg * 1.8 && br > bb * 1.8) r++;
        // 초록색: 신호등 특유의 청록색 필터링
        if (bg > 160 && bg > br * 1.3 && bb > 120) g++;
    }
    if (r / total > 0.06) return 'red';
    if (g / total > 0.06) return 'green';
    return 'unknown';
}

function processFinalResult(color) {
    if (color === lastAnnouncedSignal) return;
    lastAnnouncedSignal = color;

    if (color === 'green') {
        statusEl.textContent = "GREEN";
        statusEl.className = "font-black text-xl text-green-500 italic";
        borderEl.className = "absolute inset-0 z-20 active-g";
        announce("초록불입니다. 건너가셔도 좋습니다.");
        triggerVibe('green');
        addLog("CONFIRMED: 초록불");
    } else if (color === 'red') {
        statusEl.textContent = "RED";
        statusEl.className = "font-black text-xl text-red-500 italic";
        borderEl.className = "absolute inset-0 z-20 active-r";
        announce("빨간불입니다. 보도 안쪽에서 기다리세요.");
        triggerVibe('red');
        addLog("CONFIRMED: 빨간불");
    } else {
        statusEl.textContent = "SCANNING...";
        statusEl.className = "font-black text-xl text-blue-400 italic";
        borderEl.className = "absolute inset-0 z-20";
    }
}

async function updateZoom(v) {
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities();
    if (caps.zoom) {
        await track.applyConstraints({ advanced: [{ zoom: Math.min(v, caps.zoom.max) }] });
        document.getElementById('zoom-badge').textContent = v.toFixed(1) + "x";
    }
}

// 터치 시 줌 리셋 및 현재 상태 재안내
document.body.addEventListener('click', () => {
    if(!isReady) return;
    updateZoom(1.0);
    zoomLevel = 1.0;
    const msg = lastAnnouncedSignal === 'green' ? "현재 초록불입니다." : 
                lastAnnouncedSignal === 'red' ? "현재 빨간불입니다." : "신호를 찾는 중입니다. 기기를 조금 더 높게 들어보세요.";
    announce(msg);
});
</script>
</body>
</html>
