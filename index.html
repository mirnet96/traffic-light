<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="&#xC2E0;&#xD638;&#xB4F1; &#xC54C;&#xB9AC;&#xBBF8;">
<title>&#xC2E0;&#xD638;&#xB4F1; &#xC54C;&#xB9AC;&#xBBF8;</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:#0f172a;color:#f1f5f9;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;user-select:none}
#app{height:100%;width:100%;position:relative;overflow:hidden}

/* ---- signal icon (CSS only, no emoji) ---- */
.sig-icon{
  width:52px;height:52px;flex-shrink:0;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;letter-spacing:-1px;
  transition:background 0.3s,color 0.3s;
}
.sig-icon.idle  {background:rgba(255,255,255,0.08);color:#94a3b8}
.sig-icon.red   {background:#991b1b;color:#fca5a5;box-shadow:0 0 16px rgba(239,68,68,0.5)}
.sig-icon.green {background:#14532d;color:#86efac;box-shadow:0 0 16px rgba(34,197,94,0.5)}

/* ---- 카메라 전체화면 ---- */
#cam-section{position:absolute;inset:0;background:#000}
#video{width:100%;height:100%;object-fit:cover;display:block}
#detect-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4}

/* ---- 테두리 오버레이 ---- */
#border-overlay{
  position:absolute;inset:0;pointer-events:none;z-index:5;
  box-shadow:inset 0 0 0 0px transparent;
  transition:box-shadow 0.35s ease;
}
#border-overlay.idle  {box-shadow:inset 0 0 0 14px rgba(59,130,246,0.6)}
#border-overlay.green {box-shadow:inset 0 0 0 22px rgba(34,197,94,0.88)}
#border-overlay.red   {box-shadow:inset 0 0 0 22px rgba(239,68,68,0.88)}
#border-overlay::before,#border-overlay::after{
  content:'';position:absolute;width:44px;height:44px;transition:border-color 0.35s}
#border-overlay::before{top:8px;left:8px;border-top:4px solid;border-left:4px solid;border-radius:5px 0 0 0}
#border-overlay::after{bottom:8px;right:8px;border-bottom:4px solid;border-right:4px solid;border-radius:0 0 5px 0}
#border-overlay.idle::before,#border-overlay.idle::after  {border-color:rgba(59,130,246,0.85)}
#border-overlay.green::before,#border-overlay.green::after{border-color:#22c55e}
#border-overlay.red::before,#border-overlay.red::after    {border-color:#ef4444}

/* ---- 상단 배너 ---- */
#banner{
  position:absolute;top:0;left:0;right:0;z-index:10;
  padding:14px 18px 16px;display:flex;align-items:center;gap:14px;
  background:rgba(15,23,42,0.82);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  transition:background 0.3s,border-color 0.3s;
}
#banner.green{background:rgba(20,83,45,0.9);border-color:rgba(34,197,94,0.25)}
#banner.red  {background:rgba(127,29,29,0.9);border-color:rgba(239,68,68,0.25)}
#signal-info{flex:1;min-width:0}
#signal-text{font-size:26px;font-weight:700;line-height:1.15}
#signal-sub {font-size:13px;color:rgba(255,255,255,0.5);margin-top:2px}
#countdown{font-size:42px;font-weight:700;color:rgba(255,255,255,0.85);
  flex-shrink:0;min-width:78px;text-align:right;line-height:1}
#countdown.urgent{color:#fbbf24;animation:blink .5s ease-in-out infinite alternate}
@keyframes blink{from{opacity:1}to{opacity:0.3}}

/* ---- 감지 칩 ---- */
#detect-chip{
  position:absolute;bottom:78px;left:50%;transform:translateX(-50%);z-index:10;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  color:rgba(255,255,255,0.75);font-size:13px;padding:7px 18px;
  border-radius:24px;white-space:nowrap;border:1px solid rgba(255,255,255,0.1);
  max-width:90%;text-align:center;
}

/* ---- 하단 컨트롤 ---- */
#control-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:10;display:none;
  align-items:center;justify-content:space-around;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,0.07);
  padding:10px 12px 28px;gap:4px;
}
.ctrl-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.3);
  font-size:10px;padding:8px 10px;border-radius:10px;min-width:52px;transition:all .15s;
}
.ctrl-btn:active{background:rgba(255,255,255,0.08)}
.ctrl-btn.active{color:#60a5fa}

/* 컨트롤 아이콘: CSS 도형 */
.icon-voice,.icon-vib,.icon-count,.icon-scan{
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.icon-voice::before{
  content:'';display:block;width:10px;height:13px;
  border:2px solid currentColor;border-radius:5px;
}
.icon-voice::after{
  content:'';position:absolute;bottom:-2px;
  width:14px;height:6px;border:2px solid currentColor;
  border-top:none;border-radius:0 0 8px 8px;
}
.icon-vib::before{
  content:'';display:block;width:12px;height:16px;
  border:2px solid currentColor;border-radius:3px;
}
.icon-count::before{
  content:'';display:block;width:16px;height:16px;
  border:2px solid currentColor;border-radius:50%;
}
.icon-count::after{
  content:'';position:absolute;top:3px;left:50%;
  width:2px;height:6px;background:currentColor;transform-origin:bottom center;
}
.icon-scan::before{
  content:'';display:block;width:16px;height:16px;
  border:2px solid currentColor;border-radius:2px;
}

#btn-stop-cam{
  background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);
  color:#f87171;font-size:13px;font-weight:600;padding:10px 16px;border-radius:10px;cursor:pointer;
}

/* ---- 시작 오버레이 ---- */
#start-overlay{
  position:absolute;inset:0;z-index:20;background:rgba(10,12,24,0.96);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:32px 28px;text-align:center;
}

/* 신호등 큰 아이콘 (CSS) */
.big-traffic-light{
  width:56px;display:flex;flex-direction:column;
  align-items:center;gap:5px;padding:8px 10px;
  background:#1e293b;border-radius:10px;border:2px solid #334155;
}
.tl-dot{width:20px;height:20px;border-radius:50%;background:#334155}
.tl-dot.red-on  {background:#ef4444;box-shadow:0 0 10px rgba(239,68,68,0.7)}
.tl-dot.green-on{background:#22c55e;box-shadow:0 0 10px rgba(34,197,94,0.7)}

#start-overlay h2{font-size:24px;font-weight:700;letter-spacing:-.5px}
.desc{font-size:15px;color:rgba(255,255,255,0.5);line-height:1.75;max-width:280px}
.desc .tag-red  {color:rgba(239,68,68,0.9) ;font-weight:600}
.desc .tag-green{color:rgba(34,197,94,0.9);font-weight:600}

#btn-start{
  background:#2563eb;color:#fff;border:none;border-radius:14px;
  font-size:18px;font-weight:700;padding:18px 0;cursor:pointer;
  width:100%;max-width:300px;margin-top:4px;
}
#btn-start:active{opacity:.85;transform:scale(.98)}
.test-row{display:flex;gap:10px;width:100%;max-width:300px}
.test-row button{flex:1;padding:14px 8px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer}
.btn-red  {background:#dc2626;color:#fff}
.btn-green{background:#16a34a;color:#fff}
.hint{font-size:12px;color:rgba(255,255,255,0.25)}

/* ---- 모델 바 ---- */
#model-bar{
  position:absolute;top:0;left:0;right:0;z-index:25;
  background:rgba(0,0,0,0.85);color:rgba(255,255,255,0.65);font-size:13px;
  padding:10px;text-align:center;display:none;
}
#model-bar.visible{display:block}
</style>
</head>
<body>
<div id="app">

  <div id="cam-section">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="detect-canvas"></canvas>
  </div>

  <div id="border-overlay"></div>

  <!-- 상단 배너 -->
  <div id="banner">
    <div class="sig-icon idle" id="sig-icon">?</div>
    <div id="signal-info">
      <div id="signal-text">신호등 알리미</div>
      <div id="signal-sub">카메라를 건너편 신호등으로</div>
    </div>
    <div id="countdown"></div>
  </div>

  <!-- 감지 칩 -->
  <div id="detect-chip">카메라를 시작하세요</div>

  <!-- 하단 컨트롤 -->
  <div id="control-bar">
    <button class="ctrl-btn active" id="ctrl-voice" onclick="toggleCtrl(this,'voice')">
      <span class="icon-voice"></span><span>음성</span>
    </button>
    <button class="ctrl-btn active" id="ctrl-vib" onclick="toggleCtrl(this,'vib')">
      <span class="icon-vib"></span><span>진동</span>
    </button>
    <button class="ctrl-btn active" id="ctrl-count" onclick="toggleCtrl(this,'count')">
      <span class="icon-count"></span><span>카운트</span>
    </button>
    <button class="ctrl-btn active" id="ctrl-scan" onclick="toggleCtrl(this,'scan')">
      <span class="icon-scan"></span><span>스캔존</span>
    </button>
    <button id="btn-stop-cam" onclick="stopCamera()">중지</button>
  </div>

  <!-- 시작 오버레이 -->
  <div id="start-overlay">
    <div class="big-traffic-light">
      <div class="tl-dot red-on"></div>
      <div class="tl-dot"></div>
      <div class="tl-dot green-on"></div>
    </div>
    <h2>보행자 신호등 알리미</h2>
    <p class="desc">
      카메라를 건너편 신호등 방향으로<br>
      향하면 자동으로 감지합니다.<br><br>
      <span class="tag-red">빨간불</span> &mdash; 화면 &bull; 진동 &bull; 음성 알림<br>
      <span class="tag-green">초록불</span> &mdash; 화면 &bull; 진동 &bull; 음성 알림
    </p>
    <button id="btn-start" onclick="startCamera()">카메라 시작</button>
    <div class="test-row">
      <button class="btn-red"   onclick="testSignal('red')">빨간불 테스트</button>
      <button class="btn-green" onclick="testSignal('green')">초록불 테스트</button>
    </div>
    <p class="hint">테스트 버튼으로 알림 방식을 먼저 확인하세요</p>
  </div>

  <div id="model-bar">AI 모델 로딩 중...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<script>
var video      = document.getElementById('video');
var dcv        = document.getElementById('detect-canvas');
var dctx       = dcv.getContext('2d');
var banner     = document.getElementById('banner');
var borderOvl  = document.getElementById('border-overlay');
var sigIcon    = document.getElementById('sig-icon');
var sigText    = document.getElementById('signal-text');
var sigSub     = document.getElementById('signal-sub');
var cdEl       = document.getElementById('countdown');
var chipEl     = document.getElementById('detect-chip');
var modelBar   = document.getElementById('model-bar');
var controlBar = document.getElementById('control-bar');
var startOvl   = document.getElementById('start-overlay');

var opts = { voice:true, vib:true, count:true, scan:true };

// 감지 파라미터
var GRID_COLS      = 4;
var GRID_ROWS      = 4;
var SCAN_TOP_RATIO = 0.15;
var SCAN_BOT_RATIO = 0.75;
var CONFIRM_FRAMES = 4;
var MISS_LIMIT     = 20;
var MIN_SATURATION = 0.42;
var MIN_VALUE      = 0.38;
var RED_DOMINANCE  = 1.7;
var GREEN_DOMINANCE= 1.5;
var COLOR_RATIO_TH = 0.07;
var MIN_BRIGHT_PX  = 60;
var RED_HUE_MAX    = 18;
var RED_HUE_MIN    = 342;
var GREEN_HUE_MIN  = 90;
var GREEN_HUE_MAX  = 160;

var stream=null, detector=null, loopId=null;
var currentSignal='unknown', pendingSignal='unknown';
var pendingFrames=0, missFrames=0;
var countdownVal=0, countdownTimer=null;
var modelReady=false, voiceUnlocked=false;
var frameCount=0;

// 안드로이드 음성 unlock
document.addEventListener('touchstart', unlockVoice, {once:true});
document.addEventListener('click',      unlockVoice, {once:true});
function unlockVoice() {
  if (voiceUnlocked || !('speechSynthesis' in window)) return;
  var u = new SpeechSynthesisUtterance('');
  u.volume = 0;
  window.speechSynthesis.speak(u);
  setTimeout(function(){ window.speechSynthesis.cancel(); }, 100);
  voiceUnlocked = true;
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = function(){ speechSynthesis.getVoices(); };
  speechSynthesis.getVoices();
}

// AI 모델 로드
async function loadModel() {
  try {
    modelBar.classList.add('visible');
    modelBar.textContent = 'AI \ubaa8\ub378 \ub85c\ub529 \uc911...';
    detector = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
    modelReady = true;
    modelBar.textContent = 'AI \ubaa8\ub378 \uc900\ube44 \uc644\ub8cc';
    setTimeout(function(){ modelBar.classList.remove('visible'); }, 2500);
  } catch(e) {
    modelReady = false;
    modelBar.textContent = '\uceec\ub7ec \ubd84\uc11d \ubaa8\ub4dc\ub85c \ub3d9\uc791\ud569\ub2c8\ub2e4';
    setTimeout(function(){ modelBar.classList.remove('visible'); }, 2500);
  }
}
loadModel();

function toggleCtrl(btn, key) {
  opts[key] = !opts[key];
  btn.classList.toggle('active', opts[key]);
  if (key === 'scan') dctx.clearRect(0,0,dcv.width,dcv.height);
}

async function startCamera() {
  unlockVoice();
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    video.srcObject = stream;
    await new Promise(function(r){ video.onloadedmetadata = r; });
    startOvl.style.display  = 'none';
    controlBar.style.display = 'flex';
    borderOvl.className      = 'idle';
    chipEl.textContent       = '\uc2e0\ud638\ub4f1 \ud0d0\uc0c9 \uc911...';
    requestAnimationFrame(detectLoop);
  } catch(e) {
    alert('\uce74\uba54\ub77c\ub97c \uc0ac\uc6a9\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4.\n' + e.message);
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(function(t){ t.stop(); });
  stream = null;
  if (loopId) cancelAnimationFrame(loopId);
  controlBar.style.display = 'none';
  startOvl.style.display   = 'flex';
  resetAll();
  chipEl.textContent = '\uce74\uba54\ub77c\ub97c \uc2dc\uc791\ud558\uc138\uc694';
}

async function detectLoop() {
  if (!stream) return;
  if (video.readyState >= 2) {
    syncCanvas();
    frameCount++;
    if (modelReady && detector && frameCount % 3 === 0) {
      await detectWithAI();
    } else {
      detectWithGrid();
    }
  }
  loopId = requestAnimationFrame(detectLoop);
}

function syncCanvas() {
  var r = video.getBoundingClientRect();
  var w = Math.floor(r.width), h = Math.floor(r.height);
  if (dcv.width !== w || dcv.height !== h) { dcv.width=w; dcv.height=h; }
}

async function detectWithAI() {
  var preds;
  try { preds = await detector.detect(video); } catch(e) { return; }
  var lights = preds.filter(function(p){ return p.class==='traffic light' && p.score>0.40; });
  if (lights.length === 0) { detectWithGrid(); return; }

  dctx.clearRect(0,0,dcv.width,dcv.height);
  var best = lights.sort(function(a,b){ return b.score-a.score; })[0];
  var bx=best.bbox[0], by=best.bbox[1], bw=best.bbox[2], bh=best.bbox[3];
  var tmp = makeOffscreen();
  var color = analyzePixels(tmp.getContext('2d'), bx, by, bw, bh);
  if (opts.scan) drawAIBox(bx, by, bw, bh, color, best.score);
  chipEl.textContent = 'AI \uc2e0\ud638\ub4f1 \uac10\uc9c0 (' + Math.round(best.score*100) + '%)';
  handleDetected(color);
}

function detectWithGrid() {
  var tmp  = makeOffscreen();
  var ctx2 = tmp.getContext('2d');
  var vw   = video.videoWidth;
  var vh   = video.videoHeight;
  var scanTop = vh * SCAN_TOP_RATIO;
  var scanH   = vh * (SCAN_BOT_RATIO - SCAN_TOP_RATIO);
  var cellW   = vw / GRID_COLS;
  var cellH   = scanH / GRID_ROWS;

  var bestRed=0, bestGreen=0;
  var hitCells = [];

  for (var row=0; row<GRID_ROWS; row++) {
    for (var col=0; col<GRID_COLS; col++) {
      var cx = col * cellW;
      var cy = scanTop + row * cellH;
      var res = analyzePixels(ctx2, cx, cy, cellW, cellH);
      if (res !== 'unknown') {
        var score = getCellScore(ctx2, cx, cy, cellW, cellH, res);
        hitCells.push({cx:cx,cy:cy,cellW:cellW,cellH:cellH,color:res,score:score});
        if (res==='red'   && score>bestRed)   bestRed=score;
        if (res==='green' && score>bestGreen) bestGreen=score;
      }
    }
  }

  if (opts.scan) updateScanZones(hitCells);
  else dctx.clearRect(0,0,dcv.width,dcv.height);

  var detected = 'unknown';
  if (bestRed>0 || bestGreen>0) {
    detected = bestRed >= bestGreen ? 'red' : 'green';
    chipEl.textContent = detected==='red'
      ? '\ube68\uac04\ubd88 \uac10\uc9c0 \uc911...'
      : '\ucd08\ub85d\ubd88 \uac10\uc9c0 \uc911...';
  } else {
    chipEl.textContent = '\uc2e0\ud638\ub4f1 \ud0d0\uc0c9 \uc911... (\uc2e0\ud638\ub4f1 \ubc29\ud5a5\uc73c\ub85c)';
  }
  handleDetected(detected);
}

function getCellScore(ctx, x, y, w, h, color) {
  x=Math.max(0,Math.floor(x)); y=Math.max(0,Math.floor(y));
  w=Math.min(Math.floor(w), ctx.canvas.width-x);
  h=Math.min(Math.floor(h), ctx.canvas.height-y);
  if (w<=0||h<=0) return 0;
  var data=ctx.getImageData(x,y,w,h).data;
  var match=0, bright=0;
  for (var i=0;i<data.length;i+=4) {
    var r=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
    if (a<100) continue;
    var mx=Math.max(r,g,b)/255, mn=Math.min(r,g,b)/255;
    if (mx<MIN_VALUE) continue;
    var sat=mx>0?(mx-mn)/mx:0;
    if (sat<MIN_SATURATION) continue;
    bright++;
    var hue=getHue(r,g,b);
    if (color==='red'   && (hue<=RED_HUE_MAX||hue>=RED_HUE_MIN) && (r/255)>RED_DOMINANCE*(g/255)) match++;
    if (color==='green' && hue>=GREEN_HUE_MIN&&hue<=GREEN_HUE_MAX && (g/255)>GREEN_DOMINANCE*(r/255)) match++;
  }
  return bright>0 ? match/bright : 0;
}

function analyzePixels(ctx, x, y, w, h) {
  x=Math.max(0,Math.floor(x)); y=Math.max(0,Math.floor(y));
  w=Math.min(Math.floor(w), ctx.canvas.width-x);
  h=Math.min(Math.floor(h), ctx.canvas.height-y);
  if (w<=0||h<=0) return 'unknown';
  var data=ctx.getImageData(x,y,w,h).data;
  var red=0, green=0, bright=0;
  for (var i=0;i<data.length;i+=4) {
    var r=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
    if (a<100) continue;
    var mx=Math.max(r,g,b)/255, mn=Math.min(r,g,b)/255;
    if (mx<MIN_VALUE) continue;
    var sat=mx>0?(mx-mn)/mx:0;
    if (sat<MIN_SATURATION) continue;
    bright++;
    var hue=getHue(r,g,b);
    if ((hue<=RED_HUE_MAX||hue>=RED_HUE_MIN) && (r/255)>RED_DOMINANCE*(g/255) && (r/255)>RED_DOMINANCE*(b/255)) red++;
    if (hue>=GREEN_HUE_MIN&&hue<=GREEN_HUE_MAX && (g/255)>GREEN_DOMINANCE*(r/255) && (g/255)>GREEN_DOMINANCE*(b/255)) green++;
  }
  if (bright<MIN_BRIGHT_PX) return 'unknown';
  var rr=red/bright, gr=green/bright;
  if (rr>gr*1.8 && rr>COLOR_RATIO_TH) return 'red';
  if (gr>rr*1.5 && gr>COLOR_RATIO_TH) return 'green';
  return 'unknown';
}

function getHue(r,g,b) {
  var nr=r/255, ng=g/255, nb=b/255;
  var mx=Math.max(nr,ng,nb), delta=mx-Math.min(nr,ng,nb);
  if (delta===0) return 0;
  var h;
  if      (mx===nr) h=((ng-nb)/delta)%6;
  else if (mx===ng) h=(nb-nr)/delta+2;
  else              h=(nr-ng)/delta+4;
  h=h*60; if(h<0)h+=360;
  return h;
}

function updateScanZones(hitCells) {
  dctx.clearRect(0,0,dcv.width,dcv.height);
  if (!opts.scan || hitCells.length===0) return;
  var vw=video.videoWidth, vh=video.videoHeight;
  var sx=dcv.width/vw, sy=dcv.height/vh;
  hitCells.forEach(function(cell){
    var col=cell.color==='green'?'rgba(34,197,94,0.75)':'rgba(239,68,68,0.75)';
    dctx.strokeStyle=col; dctx.lineWidth=2.5;
    dctx.beginPath();
    dctx.roundRect(cell.cx*sx, cell.cy*sy, cell.cellW*sx, cell.cellH*sy, 5);
    dctx.stroke();
    dctx.fillStyle=cell.color==='green'?'rgba(34,197,94,0.12)':'rgba(239,68,68,0.12)';
    dctx.fill();
  });
}

function drawAIBox(bx,by,bw,bh,color,score) {
  var sx=dcv.width/video.videoWidth, sy=dcv.height/video.videoHeight;
  var col=color==='green'?'#22c55e':color==='red'?'#ef4444':'#94a3b8';
  dctx.strokeStyle=col; dctx.lineWidth=3;
  dctx.beginPath(); dctx.roundRect(bx*sx,by*sy,bw*sx,bh*sy,8); dctx.stroke();
  dctx.fillStyle=col;
  dctx.beginPath(); dctx.roundRect(bx*sx,by*sy-26,130,22,4); dctx.fill();
  dctx.fillStyle='#fff'; dctx.font='bold 12px system-ui';
  var lbl=color==='green'?'\ucd08\ub85d\ubd88':color==='red'?'\ube68\uac04\ubd88':'\uc2e0\ud638\ub4f1';
  dctx.fillText(lbl+' '+Math.round(score*100)+'%', bx*sx+6, by*sy-9);
}

function makeOffscreen() {
  var c=document.createElement('canvas');
  c.width=video.videoWidth; c.height=video.videoHeight;
  c.getContext('2d').drawImage(video,0,0);
  return c;
}

function handleDetected(color) {
  if (color==='unknown') {
    missFrames++;
    pendingSignal='unknown'; pendingFrames=0;
    if (missFrames>=MISS_LIMIT && currentSignal!=='unknown') { resetSignal(); missFrames=0; }
    return;
  }
  missFrames=0;
  if (color===pendingSignal) { pendingFrames++; } else { pendingSignal=color; pendingFrames=1; return; }
  if (pendingFrames>=CONFIRM_FRAMES) {
    pendingFrames=0;
    if (color!==currentSignal) { currentSignal=color; fireSignal(color, color==='green'?25:30); }
  }
}

function fireSignal(color, seconds) {
  applyUI(color, seconds);
  if (opts.voice) speak(color);
  if (opts.vib)   vibrate(color);
}
function testSignal(color) { unlockVoice(); currentSignal=color; fireSignal(color, color==='green'?25:30); }

function applyUI(color, seconds) {
  clearInterval(countdownTimer);
  banner.className=color; borderOvl.className=color;
  sigIcon.className='sig-icon '+color;
  if (color==='green') {
    sigIcon.textContent='GO';
    sigText.textContent='\uac74\ub108\uc138\uc694';
    sigSub.textContent='\ucd08\ub85d\ubd88\uc785\ub2c8\ub2e4';
  } else {
    sigIcon.textContent='STOP';
    sigText.textContent='\uba48\ucdb0\uc138\uc694';
    sigSub.textContent='\ube68\uac04\ubd88\uc785\ub2c8\ub2e4';
  }
  if (opts.count && seconds>0) {
    countdownVal=seconds; cdEl.textContent=countdownVal+'\ucd08'; cdEl.classList.remove('urgent');
    countdownTimer=setInterval(function(){
      countdownVal--;
      if (countdownVal<=0) { clearInterval(countdownTimer); cdEl.textContent=''; cdEl.classList.remove('urgent'); }
      else {
        cdEl.textContent=countdownVal+'\ucd08';
        cdEl.classList.toggle('urgent', countdownVal<=5);
        if (countdownVal<=5 && opts.vib) navigator.vibrate&&navigator.vibrate(80);
      }
    },1000);
  } else { cdEl.textContent=''; }
}

function resetSignal() {
  currentSignal='unknown'; clearInterval(countdownTimer);
  banner.className=''; borderOvl.className=stream?'idle':'';
  sigIcon.className='sig-icon idle'; sigIcon.textContent='?';
  sigText.textContent='\uc2e0\ud638\ub4f1 \ud0d0\uc0c9 \uc911';
  sigSub.textContent='\uce74\uba54\ub77c\ub97c \uac74\ub108\ud3b8 \uc2e0\ud638\ub4f1\uc73c\ub85c';
  cdEl.textContent=''; cdEl.classList.remove('urgent');
}
function resetAll() {
  pendingSignal='unknown'; pendingFrames=0; missFrames=0; resetAll_inner();
  dctx.clearRect(0,0,dcv.width,dcv.height);
}
function resetAll_inner() { resetSignal(); }

function speak(color) {
  if (!opts.voice||!('speechSynthesis' in window)) return;
  try {
    window.speechSynthesis.cancel();
    var msg=color==='green'?'\ucd08\ub85d\ubd88\uc785\ub2c8\ub2e4. \uac74\ub108\uc138\uc694.':'\ube68\uac04\ubd88\uc785\ub2c8\ub2e4. \uba48\ucdb0\uc138\uc694.';
    var u=new SpeechSynthesisUtterance(msg);
    u.lang='ko-KR'; u.rate=0.9; u.volume=1;
    var ko=window.speechSynthesis.getVoices().find(function(v){return v.lang.startsWith('ko');});
    if (ko) u.voice=ko;
    window.speechSynthesis.speak(u);
  } catch(e){}
}

function vibrate(color) {
  if (!opts.vib||!navigator.vibrate) return;
  navigator.vibrate(color==='green'?[200,100,200]:[500,150,500,150,500]);
}
</script>
